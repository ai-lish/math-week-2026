<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學公式卡牌 — 幾何篇</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="window._katexAutoRenderReady=true;"></script>
<style>
@page { size: A4; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* 幾何篇主色調：深空藍 + 金色 */
  --g-base: #0a0e1a;
  --g-card-bg: #111827;
  --g-gold: #f59e0b;
  --g-gold-light: #fcd34d;
  --g-border: rgba(245,158,11,0.3);

  /* 類別顔色 */
  --cat-area-color: #3b82f6;
  --cat-area-light: #93c5fd;
  --cat-area-bg: #1e3a5f;

  --cat-peri-color: #f59e0b;
  --cat-peri-light: #fcd34d;
  --cat-peri-bg: #3d2e00;

  --cat-vol-color: #10b981;
  --cat-vol-light: #6ee7b7;
  --cat-vol-bg: #064e3b;

  --cat-algebra-color: #7c3aed;
  --cat-algebra-light: #c4b5fd;
  --cat-algebra-bg: #2e1065;

  --cat-stats-color: #db2777;
  --cat-stats-light: #f9a8d4;
  --cat-stats-bg: #4a0519;
}

body {
  font-family: "Noto Sans TC","PingFang TC","Microsoft JhengHei","Heiti TC",Arial,sans-serif;
  background: #f8fafc;
  color: #1e293b;
  min-height: 100vh;
}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
.header {
  background: #fff;
  border-bottom: 2px solid #e2e8f0;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.header-left { display: flex; flex-direction: column; gap: 4px; }
.header h1 {
  font-size: 20px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: 1px;
}
.header-sub {
  font-size: 12px;
  color: #64748b;
  letter-spacing: 0.5px;
}
.header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  background: #fffbeb;
  border: 1.5px solid #f59e0b;
  color: #d97706;
  letter-spacing: 1px;
}

/* ═══════════════════════════════════
   CONTROLS
═══════════════════════════════════ */
.controls {
  background: #fff;
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid #e2e8f0;
}
.ctrl-label { font-size: 13px; color: #64748b; font-weight: 600; }

.tabs { display: flex; gap: 4px; }
.tab-btn {
  padding: 6px 16px;
  border-radius: 8px;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  color: #64748b;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.tab-btn:hover { border-color: #f59e0b; color: #f59e0b; }
.tab-btn.active {
  background: linear-gradient(135deg, #f59e0b, #d97706);
  border-color: #f59e0b;
  color: #fff;
  box-shadow: 0 2px 8px rgba(245,158,11,0.3);
}

.sel-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  color: #64748b;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.sel-btn:hover { border-color: #f59e0b; color: #f59e0b; }

.counter { font-size: 12px; color: #64748b; margin-left: 8px; }
.counter span { color: #f59e0b; font-weight: 700; }

.print-btn {
  margin-left: auto;
  padding: 9px 22px;
  border-radius: 10px;
  background: linear-gradient(135deg, #10b981, #059669);
  border: none;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(16,185,129,0.3);
  font-family: inherit;
  transition: all 0.2s;
}
.print-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16,185,129,0.4); }

/* ═══════════════════════════════════
   CARD GRID
═══════════════════════════════════ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 200px);
  gap: 16px;
  padding: 24px 28px;
}

/* ═══════════════════════════════════
   CARD WRAPPER
═══════════════════════════════════ */
.card-wrap {
  position: relative;
  width: 200px;
  height: 295px;
  cursor: pointer;
}
.card-wrap.hidden { display: none; }

/* Selected outline */
.card-wrap.selected .card-inner {
  outline: 3px solid #f59e0b;
  outline-offset: 2px;
  box-shadow: 0 8px 24px rgba(245,158,11,0.2);
}

/* Selector tick button */
.card-selector {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  border: 2px solid #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #f59e0b;
  font-weight: 700;
  z-index: 10;
  cursor: pointer;
  transition: all 0.2s;
}
.card-wrap.selected .card-selector {
  background: #f59e0b;
  border-color: #f59e0b;
  color: #fff;
}
.card-selector:hover {
  transform: scale(1.1);
}

/* ═══════════════════════════════════
   CARD INNER
═══════════════════════════════════ */
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
}
.card-wrap:not(.flipped):hover .card-inner {
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* ═══════════════════════════════════
   FRONT FACE — white card
═══════════════════════════════════ */
.front-face {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: #fff;
  border: 1.5px solid #e2e8f0;
}

/* Subtle pattern */
.front-face::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 0% 0%, rgba(59,130,246,0.04) 0%, transparent 50%);
  pointer-events: none;
}

/* Top bar */
.card-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px 4px;
  position: relative;
  z-index: 2;
}
.card-set {
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: #94a3b8;
}
.card-meta { display: flex; gap: 6px; align-items: center; }
.card-difficulty { display: flex; gap: 2px; }
.star {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #e2e8f0;
}
.star.lit {
  background: linear-gradient(135deg, #fcd34d, #f59e0b);
}

/* Grade badge */
.card-grade {
  font-size: 8px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 6px;
  letter-spacing: 0.5px;
}
.grade-s1 { background: #dbeafe; color: #1d4ed8; }
.grade-s2 { background: #ede9fe; color: #6d28d9; }
.grade-s3 { background: #fef3c7; color: #92400e; }

/* Category badge */
.card-cat-badge {
  position: absolute;
  top: 38px;
  right: 8px;
  font-size: 7px;
  font-weight: 800;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 5px;
  color: #fff;
  z-index: 2;
}
[data-cat="area"]  .card-cat-badge { background: var(--cat-area-color); }
[data-cat="peri"]  .card-cat-badge { background: var(--cat-peri-color); color:#1e293b; }
[data-cat="vol"]   .card-cat-badge { background: var(--cat-vol-color); }

/* Geometry icon area */
.card-icon {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 14px;
  position: relative;
  z-index: 1;
}
.card-icon svg { width: 108px; height: 108px; }

/* Card name area */
.card-name-area {
  padding: 4px 10px 2px;
  text-align: center;
  position: relative;
  z-index: 2;
}
.card-name {
  font-size: 15px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: 0.5px;
  line-height: 1.3;
}
.card-en {
  font-size: 9px;
  color: #94a3b8;
  letter-spacing: 0.5px;
  margin-top: 1px;
  font-style: italic;
}

/* Bottom bar */
.card-bottombar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 10px 8px;
  position: relative;
  z-index: 2;
}
.card-num {
  font-size: 10px;
  font-weight: 700;
  color: #cbd5e1;
  letter-spacing: 0.5px;
}
.card-ask {
  font-size: 9px;
  color: #94a3b8;
  font-weight: 600;
}

/* Special edition */
.card-wrap.special .front-face {
  border: 2px solid transparent;
  background:
    linear-gradient(#fff, #fff) padding-box,
    linear-gradient(135deg, #fcd34d, #f59e0b, #ef4444, #8b5cf6, #3b82f6, #10b981, #fcd34d) border-box;
  background-size: 300% 300%;
  animation: rainbow-border 4s linear infinite;
}
@keyframes rainbow-border {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.special-star {
  position: absolute;
  top: 36px;
  left: 8px;
  font-size: 11px;
  z-index: 5;
}
.special-tag {
  position: absolute;
  bottom: 7px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  font-weight: 800;
  padding: 2px 9px;
  border-radius: 8px;
  background: linear-gradient(135deg, #fcd34d, #f59e0b);
  color: #1e293b;
  letter-spacing: 0.5px;
  z-index: 5;
  box-shadow: 0 2px 6px rgba(252,211,77,0.4);
}

/* ═══════════════════════════════════
   BACK FACE
═══════════════════════════════════ */
.back-face {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
}

/* Category-colored back */
[data-cat="area"]  .back-face { background: linear-gradient(160deg, #1e3a5f 0%, #1e40af, #312e81); }
[data-cat="peri"]  .back-face { background: linear-gradient(160deg, #3d2e00 0%, #92400e, #b45309); }
[data-cat="vol"]   .back-face { background: linear-gradient(160deg, #064e3b 0%, #047857, #059669); }

/* Back header */
.back-header {
  padding: 8px 12px 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 2;
}
.back-tag {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
}
.back-grade-badge {
  font-size: 8px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 6px;
}
.grade-s1-back { background: rgba(59,130,246,0.3); color: #93c5fd; }
.grade-s2-back { background: rgba(139,92,246,0.3); color: #c4b5fd; }
.grade-s3-back { background: rgba(245,158,11,0.3); color: #fde68a; }

/* Formula area */
.back-formula {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2px 12px 6px;
  gap: 6px;
  position: relative;
  z-index: 2;
}
.back-fcn {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  text-align: center;
  letter-spacing: 0.3px;
  line-height: 1.4;
}
.back-latex {
  display: flex;
  justify-content: center;
  padding: 2px 0;
}
.back-latex .katex { font-size: 18px !important; font-weight: 600; }

/* Back divider */
.back-divider {
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  margin: 0 auto;
}

/* Quick recall tip */
.back-tip {
  padding: 4px 12px 6px;
  position: relative;
  z-index: 2;
}
.back-tip-text {
  font-size: 9px;
  color: rgba(255,255,255,0.6);
  text-align: center;
  line-height: 1.5;
  font-style: italic;
}

/* Back footer */
.back-footer {
  padding: 4px 12px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 2;
}
.back-cat-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
}
.back-deco {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}

/* ═══════════════════════════════════
   FLIP — simple opacity toggle
═══════════════════════════════════ */
.card-wrap.flipped .front-face { opacity: 0; }
.card-wrap.flipped .back-face  { opacity: 1; }

/* ═══════════════════════════════════
   PRINT
═══════════════════════════════════ */
@media print {
  body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .header, .controls, .card-grid { display: none !important; }

  @page { size: A4; margin: 0; }

  .print-sheet {
    width: 210mm; height: 297mm;
    page-break-after: always;
    position: relative; overflow: hidden;
    background: #fff;
  }
  .print-sheet:last-child { page-break-after: avoid; }

  .print-grid {
    display: grid;
    grid-template-columns: repeat(3, 63mm);
    grid-template-rows: repeat(3, 88mm);
    gap: 3mm;
    padding: 6mm;
  }

  /* Front */
  .p-card.front {
    background: #fff !important;
    border-radius: 6mm;
    padding: 3mm;
    display: flex; flex-direction: column;
    border: 0.3mm solid #e2e8f0;
  }
  /* Back */
  .p-card.back {
    border-radius: 6mm;
    padding: 3mm;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  /* Special front */
  .p-card.front.special {
    border: 0.4mm solid transparent;
    background:
      linear-gradient(#fff, #fff) padding-box,
      linear-gradient(135deg,#fcd34d,#f59e0b,#ef4444,#8b5cf6,#3b82f6,#10b981,#fcd34d) border-box !important;
    background-size: 300% 300% !important;
  }

  /* Front elements */
  .p-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:2mm; }
  .p-set { font-size:2.8mm; font-weight:800; color:#94a3b8; letter-spacing:1mm; }
  .p-stars { display:flex; gap:1mm; }
  .p-star { width:2.5mm; height:2.5mm; border-radius:50%; background:#334155; }
  .p-star.lit { background:linear-gradient(135deg,#fcd34d,#f59e0b); }
  .p-cat-badge { font-size:2.5mm; font-weight:800; padding:0.5mm 2mm; border-radius:2mm; color:#fff; margin-top:1mm; }
  .p-icon { flex:1; display:flex; align-items:center; justify-content:center; }
  .p-icon svg { width:32mm; height:32mm; }
  .p-name { font-size:6mm; font-weight:800; color:#0f172a; text-align:center; letter-spacing:0.5mm; line-height:1.3; margin-top:2mm; }
  .p-en { font-size:3mm; color:#64748b; text-align:center; margin-top:1mm; font-style:italic; }
  .p-bottombar { display:flex; justify-content:space-between; align-items:center; margin-top:2mm; }
  .p-num { font-size:3mm; color:#cbd5e1; font-weight:700; }
  .p-ask { font-size:3mm; color:#94a3b8; font-weight:600; }

  /* Back elements */
  .p-btag { font-size:2.5mm; color:rgba(255,255,255,0.6); font-weight:700; letter-spacing:0.5mm; text-align:center; margin-bottom:2mm; }
  .p-bfcn { font-size:3mm; font-weight:400; color:rgba(255,255,255,0.7); text-align:center; line-height:1.2; letter-spacing:0.3mm; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .p-blatex { font-size:6mm; font-weight:600; color:#fff; text-align:center; margin-top:1mm; line-height:1.2; }
  .p-btip { font-size:2.8mm; color:rgba(255,255,255,0.6); text-align:center; font-style:italic; margin-top:3mm; line-height:1.6; }

  /* Category back colors */
  .pb-area { background:linear-gradient(160deg,#1e3a5f,#1e40af,#312e81) !important; }
  .pb-peri { background:linear-gradient(160deg,#3d2e00,#92400e,#b45309) !important; }
  .pb-vol  { background:linear-gradient(160deg,#064e3b,#047857,#059669) !important; }
  .pb-algebra { background:linear-gradient(160deg,#2e1065,#4c1d95,#6d28d9) !important; }
  .pb-stats  { background:linear-gradient(160deg,#4a0519,#831843,#be185d) !important; }

  /* Positioning */
  .pp1{left:6mm;   top:6mm;   position:absolute;}
  .pp2{left:72mm;  top:6mm;   position:absolute;}
  .pp3{left:138mm; top:6mm;   position:absolute;}
  .pp4{left:6mm;   top:97mm;  position:absolute;}
  .pp5{left:72mm;  top:97mm;  position:absolute;}
  .pp6{left:138mm; top:97mm;  position:absolute;}
  .pp7{left:6mm;   top:188mm; position:absolute;}
  .pp8{left:72mm;  top:188mm; position:absolute;}
  .pp9{left:138mm; top:188mm; position:absolute;}

  .print-sheets { display: none !important; }
  .print-sheets.show { display: block !important; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>📐 數學公式卡牌</h1>
    <div class="header-sub">幾何篇 · Geometry Set · 2026</div>
  </div>
  <div class="header-badge">GEOMETRY · G-Series</div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <span class="ctrl-label">分類</span>
  <div class="tabs">
    <button class="tab-btn active" data-tab="all">全部</button>
    <button class="tab-btn" data-tab="area">面積</button>
    <button class="tab-btn" data-tab="peri">周界</button>
    <button class="tab-btn" data-tab="vol">體積</button>
    <button class="tab-btn" data-tab="algebra">代數</button>
    <button class="tab-btn" data-tab="stats">統計</button>
  </div>
  <span class="ctrl-label" style="margin-left:12px;">選擇</span>
  <div class="select-btns">
    <button class="sel-btn" onclick="selectAll()">全選</button>
    <button class="sel-btn" onclick="selectNone()">全取消</button>
  </div>
  <span class="counter"><span id="sel-count">0</span> / <span id="total-count">0</span></span>
  <button class="print-btn" onclick="printSelected()">🖨️ 列印所選</button>
</div>

<!-- CARD GRID -->
<div class="card-grid" id="cardGrid"></div>

<!-- PRINT OUTPUT -->
<div class="print-sheets" id="printArea"></div>

<script>
const CARDS = [
  /* ══ 面積 AREA ══ */
  { id:1,  cat:"area", name:"長方形",        en:"Rectangle",      ask:"求面積",   tag:"面積", grade:"s1",
    num:"G-01", difficulty:1, special:false,
    fcn:"面積 = 長 × 寬", latex:"A = \\text{長} \\times \\text{寬}",
    tip:"長闊分清楚，記緊兩邊都要用！",
    svg:`<svg viewBox="0 0 110 110">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
          <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1"/>
        </linearGradient>
      </defs>
      <rect x="12" y="28" width="86" height="58" rx="6" fill="url(#g1)" stroke="#60a5fa" stroke-width="9"/>
      <line x1="12" y1="28" x2="24" y2="16" stroke="#93c5fd" stroke-width="5" stroke-linecap="round"/>
      <line x1="24" y1="16" x2="46" y2="16" stroke="#93c5fd" stroke-width="5" stroke-linecap="round"/>
      <text x="26" y="13" font-size="12" fill="#93c5fd" font-weight="bold" font-family="sans-serif">長</text>

    </svg>` },

  { id:35, cat:"stats", name:"方差",           en:"Variance",            ask:"求方差",   tag:"統計", grade:"s3",
    num:"S-05", difficulty:2, special:false,
    fcn:"Var = Σ(x−x̄)²÷n", latex:"\\text{Var} = \\frac{\\sum(x-\\bar{x})^2}{n}",
    tip:"標準差平方就係方差！",
    svg:`<svg viewBox="0 0 110 110">
      <defs>
        <linearGradient id="gs5" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3"/>
          <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.1"/>
        </linearGradient>
      </defs>
      <rect x="15" y="20" width="80" height="70" rx="6" fill="url(#gs5)" stroke="#7c3aed" stroke-width="9"/>
      <text x="55" y="55" font-size="22" fill="#a78bfa" font-weight="bold" font-family="sans-serif" text-anchor="middle">Var</text>
      <text x="55" y="80" font-size="11" fill="#c4b5fd" font-family="sans-serif" text-anchor="middle">Σ偏差²÷n</text>
    </svg>` },

  { id:36, cat:"stats", name:"概率",           en:"Probability",         ask:"求概率",   tag:"統計", grade:"s1",
    num:"S-06", difficulty:1, special:false,
    fcn:"P = 成功情況 ÷ 所有情況", latex:"P(A) = \\frac{\\text{成功}}{\\text{總數}}",
    tip:"分子係我想要嘅情況，分母係全部情況！",
    svg:`<svg viewBox="0 0 110 110">
      <defs>
        <linearGradient id="gs6" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.3"/>
          <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.1"/>
        </linearGradient>
      </defs>
      <rect x="15" y="20" width="80" height="70" rx="6" fill="url(#gs6)" stroke="#16a34a" stroke-width="9"/>
      <text x="55" y="55" font-size="26" fill="#4ade80" font-weight="bold" font-family="sans-serif" text-anchor="middle">P</text>
      <text x="55" y="80" font-size="11" fill="#86efac" font-family="sans-serif" text-anchor="middle">成功 ÷ 總數</text>
    </svg>` },

  { id:37, cat:"stats", name:"排列",           en:"Permutation",         ask:"求排列",   tag:"統計", grade:"s3",
    num:"S-07", difficulty:2, special:false,
    fcn:"P(n,r) = n!÷(n−r)!", latex:"P(n,r) = \\frac{n!}{(n-r)!}",
    tip:"排嘢有順序，n揀r個排法總數！",
    svg:`<svg viewBox="0 0 110 110">
      <defs>
        <linearGradient id="gs7" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.3"/>
          <stop offset="100%" style="stop-color:#be185d;stop-opacity:0.1"/>
        </linearGradient>
      </defs>
      <rect x="15" y="20" width="80" height="70" rx="6" fill="url(#gs7)" stroke="#be185d" stroke-width="9"/>
      <text x="55" y="55" font-size="26" fill="#f472b6" font-weight="bold" font-family="sans-serif" text-anchor="middle">n!</text>
      <text x="55" y="80" font-size="11" fill="#f9a8d4" font-family="sans-serif" text-anchor="middle">P(n,r) 排列</text>
    </svg>` },

  { id:38, cat:"stats", name:"組合",           en:"Combination",         ask:"求組合",   tag:"統計", grade:"s3",
    num:"S-08", difficulty:2, special:false,
    fcn:"C(n,r) = n!÷r!(n−r)!", latex:"C(n,r) = \\frac{n!}{r!(n-r)!}",
    tip:"揀嘢冇順序，記住除以 r! 嚟取消順序！",
    svg:`<svg viewBox="0 0 110 110">
      <defs>
        <linearGradient id="gs8" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.3"/>
          <stop offset="100%" style="stop-color:#0369a1;stop-opacity:0.1"/>
        </linearGradient>
      </defs>
      <rect x="15" y="20" width="80" height="70" rx="6" fill="url(#gs8)" stroke="#0369a1" stroke-width="9"/>
      <text x="55" y="55" font-size="26" fill="#38bdf8" font-weight="bold" font-family="sans-serif" text-anchor="middle">C</text>
      <text x="55" y="80" font-size="11" fill="#7dd3fc" font-family="sans-serif" text-anchor="middle">n!÷r!(n−r)!</text>
    </svg>` },
];

let selected = new Set(CARDS.map(c => c.id));
let activeFilters = new Set(['all']);

function renderLatex(el, formula) {
  try {
    const html = katex.renderToString(formula, { throwOnError: false, displayMode: false });
    if (!html || html.trim() === '') throw new Error('empty render');
    el.innerHTML = html;
  } catch(e) {
    // KaTeX failed — show plain formula text as fallback
    el.textContent = formula;
  }
}

function stars(n) {
  return Array.from({length:3},(_,i) =>
    `<span class="star${i < n ? ' lit' : ''}"></span>`
  ).join('');
}

function gradeLabel(g) {
  return g === 's1' ? '中一' : g === 's2' ? '中二' : '中三';
}
function gradeClass(g) {
  return g === 's1' ? 'grade-s1' : g === 's2' ? 'grade-s2' : 'grade-s3';
}
function gradeClassBack(g) {
  return g === 's1' ? 'grade-s1-back' : g === 's2' ? 'grade-s2-back' : 'grade-s3-back';
}

function catLabel(cat) {
  return cat === 'area' ? '面積' : cat === 'peri' ? '周界' : cat === 'vol' ? '體積' : cat === 'algebra' ? '代數' : '統計';
}
function catEmoji(cat) {
  return cat === 'area' ? '⬡' : cat === 'peri' ? '◯' : cat === 'vol' ? '◈' : cat === 'algebra' ? '∑' : 'σ';
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  const filtered = CARDS.filter(c => activeFilters.has('all') || activeFilters.has(c.cat));

  filtered.forEach(card => {
    const wrap = document.createElement('div');
    wrap.className = `card-wrap${selected.has(card.id) ? ' selected' : ''}${card.special ? ' special' : ''}`;
    wrap.dataset.cat = card.cat;
    wrap.dataset.id = card.id;

    wrap.addEventListener('click', (e) => {
      if (e.target.closest('.card-selector')) {
        e.stopPropagation();
        if (selected.has(card.id)) selected.delete(card.id);
        else selected.add(card.id);
        wrap.classList.toggle('selected', selected.has(card.id));
        const sel = wrap.querySelector('.card-selector');
        if (sel) sel.textContent = selected.has(card.id) ? '✓' : '';
        updateCount();
      } else {
        wrap.classList.toggle('flipped');
      }
    });

    wrap.innerHTML = `
      <div class="card-selector">${selected.has(card.id) ? '✓' : ''}</div>
      ${card.special ? '<span class="special-star">★</span>' : ''}
      <div class="card-inner">
        <div class="front-face">
          <div class="card-topbar">
            <span class="card-set">GEOMETRY</span>
            <div class="card-meta">
              <span class="card-grade ${gradeClass(card.grade)}">${gradeLabel(card.grade)}</span>
              <div class="card-difficulty">${stars(card.difficulty)}</div>
            </div>
          </div>
          <span class="card-cat-badge">${catLabel(card.cat)}</span>
          <div class="card-icon">${card.svg}</div>
          <div class="card-name-area">
            <div class="card-name">${card.name}</div>
            <div class="card-en">${card.en}</div>
          </div>
          <div class="card-bottombar">
            <span class="card-num">${card.num}</span>
            <span class="card-ask">${card.ask}</span>
          </div>
        </div>
        <div class="back-face">
          <div class="back-header">
            <span class="back-tag">${card.name} · ${catLabel(card.cat)}</span>
            <span class="back-grade-badge ${gradeClassBack(card.grade)}">${gradeLabel(card.grade)}</span>
          </div>
          <div class="back-formula">
            <div class="back-fcn">${card.fcn}</div>
            <div class="back-divider"></div>
            <div class="back-latex"><span class="latex-el" data-latex="${card.latex}"></span></div>
          </div>
          <div class="back-tip">
            <div class="back-tip-text">💡 ${card.tip}</div>
          </div>
          <div class="back-footer">
            <span class="back-cat-label">${catEmoji(card.cat)} ${catLabel(card.cat)}</span>
            <div class="back-deco">${catEmoji(card.cat)}</div>
          </div>
        </div>
      </div>
      ${card.special ? '<span class="special-tag">★ 特別版</span>' : ''}`;
    grid.appendChild(wrap);

    // Render LaTeX on back
    wrap.querySelectorAll('.latex-el').forEach(el => renderLatex(el, card.latex));
  });
  updateCount();
}

function selectAll() { CARDS.forEach(c => selected.add(c.id)); renderCards(); updateCount(); }
function selectNone() { selected.clear(); renderCards(); updateCount(); }

function updateCount() {
  document.getElementById('sel-count').textContent = selected.size;
  document.getElementById('total-count').textContent = CARDS.length;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    const tab = btn.dataset.tab;

    if (tab === 'all') {
      // "全部" clears all other filters and shows all
      activeFilters.clear();
      activeFilters.add('all');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      // Remove 'all' when any category is selected
      activeFilters.delete('all');
      document.querySelector('.tab-btn[data-tab="all"]').classList.remove('active');

      // Toggle this category
      if (activeFilters.has(tab)) {
        activeFilters.delete(tab);
        btn.classList.remove('active');
        // If no categories left, revert to all
        if (activeFilters.size === 0) {
          activeFilters.add('all');
          document.querySelector('.tab-btn[data-tab="all"]').classList.add('active');
        }
      } else {
        activeFilters.add(tab);
        btn.classList.add('active');
      }
    }
    renderCards();
  };
});

function printSelected() {
  const cards = CARDS.filter(c => selected.has(c.id));
  if (cards.length === 0) { alert('請先選擇要列印的卡牌'); return; }

  const printArea = document.getElementById('printArea');
  printArea.innerHTML = '';
  printArea.classList.add('show');

  const pages = [];
  for (let i = 0; i < cards.length; i += 9) pages.push(cards.slice(i, i + 9));

  pages.forEach((pageCards) => {
    // Front sheet
    const sheet = document.createElement('div');
    sheet.className = 'print-sheet';
    sheet.innerHTML = `<div class="print-grid"></div>`;
    const grid = sheet.querySelector('.print-grid');
    pageCards.forEach((card, i) => {
      grid.innerHTML += `
        <div class="p-card front pp${i+1}${card.special ? ' special' : ''}" style="background:#fff;">
          <div class="p-topbar">
            <span class="p-set">GEOMETRY</span>
            <div style="display:flex;gap:2mm;align-items:center;">
              <span style="font-size:2.5mm;font-weight:800;padding:0.5mm 2mm;border-radius:1.5mm;background:${card.grade==='s1'?'#dbeafe':card.grade==='s2'?'#ede9fe':'#fef3c7'};color:${card.grade==='s1'?'#1d4ed8':card.grade==='s2'?'#6d28d9':'#92400e'};letter-spacing:0.3mm;">${gradeLabel(card.grade)}</span>
              <div class="p-stars">${stars(card.difficulty)}</div>
            </div>
          </div>
          <div style="text-align:right;"><span class="p-cat-badge" style="display:inline-block;background:${card.cat==='area'?'#3b82f6':card.cat==='peri'?'#f59e0b':card.cat==='vol'?'#10b981':card.cat==='algebra'?'#7c3aed':'#db2777'};padding:1mm 2mm;border-radius:2mm;font-size:2.5mm;font-weight:bold;color:${card.cat==='peri'?'#1e293b':'#fff'};letter-spacing:0.5mm;">${catLabel(card.cat)}</span></div>
          <div class="p-icon">${card.svg}</div>
          <div class="p-name">${card.name}</div>
          <div class="p-en" style="font-size:3mm;color:#94a3b8;text-align:center;font-style:italic;">${card.en}</div>
          <div class="p-bottombar">
            <span class="p-num">${card.num}</span>
            <span class="p-ask">${card.ask}</span>
          </div>
        </div>`;
    });
    printArea.appendChild(sheet);

    // Back sheet
    const sheetB = document.createElement('div');
    sheetB.className = 'print-sheet';
    sheetB.innerHTML = `<div class="print-grid"></div>`;
    const gridB = sheetB.querySelector('.print-grid');
    pageCards.forEach((card, i) => {
      const catClass = card.cat === 'area' ? 'pb-area' : card.cat === 'peri' ? 'pb-peri' : card.cat === 'vol' ? 'pb-vol' : card.cat === 'algebra' ? 'pb-algebra' : 'pb-stats';
      gridB.innerHTML += `
        <div class="p-card back pp${i+1} ${catClass}" style="border-radius:6mm;padding:3mm;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5mm;">
          <div style="display:flex;align-items:center;gap:2mm;">
            <span style="font-size:2.5mm;color:rgba(255,255,255,0.6);font-weight:700;letter-spacing:0.5mm;">${card.name} · ${catLabel(card.cat)}</span>
            <span style="font-size:2.2mm;font-weight:800;padding:0.5mm 2mm;border-radius:1.5mm;background:${card.grade==='s1'?'rgba(59,130,246,0.3)':card.grade==='s2'?'rgba(139,92,246,0.3)':'rgba(245,158,11,0.3)'};color:${card.grade==='s1'?'#93c5fd':card.grade==='s2'?'#c4b5fd':'#fde68a'};">${gradeLabel(card.grade)}</span>
          </div>
          <div class="p-bfcn" style="font-size:5.5mm;font-weight:800;color:#fff;text-align:center;line-height:1.2;letter-spacing:0.3mm;">${card.fcn}</div>
          <div class="p-blatex" style="font-size:3.5mm;color:#fff;text-align:center;margin-top:2mm;">\\[${card.latex}\\]</div>
          <div class="p-btip" style="font-size:2.8mm;color:rgba(255,255,255,0.6);text-align:center;font-style:italic;margin-top:3mm;line-height:1.6;">💡 ${card.tip}</div>
        </div>`;
    });
    printArea.appendChild(sheetB);
  });

  // Render KaTeX display-mode delimiters for print output
  if (typeof renderMathInElement === 'function') {
    setTimeout(() => {
      renderMathInElement(printArea, {
        delimiters: [{left: '\\[', right: '\\]', display: true}],
        throwOnError: false
      });
      setTimeout(() => window.print(), 200);
    }, 100);
  } else {
    setTimeout(() => window.print(), 400);
  }
  setTimeout(() => { printArea.innerHTML = ''; printArea.classList.remove('show'); }, 800);
}

renderCards();
updateCount();
</script>
