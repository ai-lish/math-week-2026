<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧮 計算機大賽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--card:#16213e;--accent:#e94560;
  --gold:#f5c518;--teal:#0f3460;--text:#eaeaea;
  --easy:#2ecc71;--med:#f39c12;--hard:#e74c3c;
}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:16px;color:var(--text);
}
.container{
  background:var(--card);
  border-radius:16px;
  width:100%;max-width:520px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  overflow:hidden;
}
/* Header */
.header{
  background:linear-gradient(135deg,#e94560,#ff6b6b);
  padding:20px;text-align:center;
}
.header h1{font-size:1.6rem;font-weight:900;color:#fff}
.header p{color:rgba(255,255,255,.8);font-size:.85rem;margin-top:4px}
/* Tab bar */
.tab-bar{
  display:flex;
  background:rgba(0,0,0,.2);
}
.tab{
  flex:1;padding:14px 0;border:none;
  font-size:.95rem;font-weight:700;cursor:pointer;
  background:transparent;color:rgba(255,255,255,.5);
  transition:all .2s;font-family:inherit;
  border-bottom:3px solid transparent;
}
.tab.active{
  color:#fff;
  border-bottom-color:var(--gold);
  background:rgba(255,255,255,.05);
}
.tab:hover:not(.active){color:rgba(255,255,255,.8)}
/* Mode select */
.mode-select{padding:24px;text-align:center}
.mode-select h2{font-size:1.1rem;margin-bottom:16px;color:var(--gold)}
.modes{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.mode-btn{
  padding:12px 20px;border:none;border-radius:10px;
  font-weight:700;font-size:1rem;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  font-family:inherit;
}
.mode-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.mode-btn.easy{background:var(--easy);color:#fff}
.mode-btn.med{background:var(--med);color:#fff}
.mode-btn.hard{background:var(--hard);color:#fff}
.mode-btn.all{background:var(--teal);color:#fff}
.mode-btn span{display:block;font-size:.7rem;opacity:.8;margin-top:2px}
/* Game area */
.game-area{padding:24px;display:none}
.timer-bar{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.05);
  padding:10px 14px;border-radius:10px;
  margin-bottom:16px;
}
.timer-label{font-weight:700;color:var(--gold);white-space:nowrap}
.timer-track{flex:1;height:8px;background:#333;border-radius:4px;overflow:hidden}
.timer-fill{height:100%;background:var(--accent);width:100%;transition:width 1s linear;border-radius:4px}
.timer-text{font-weight:900;font-size:1.1rem;min-width:40px;text-align:right}
.timer-warning .timer-fill{background:var(--hard);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.score-board{
  display:flex;justify-content:space-between;
  background:rgba(255,255,255,.05);
  padding:10px 14px;border-radius:10px;
  margin-bottom:16px;font-size:.9rem;
}
.score-pos{color:var(--easy);font-weight:700}
.score-neg{color:var(--hard);font-weight:700}
.difficulty-badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:.75rem;font-weight:700;color:#fff;
}
.difficulty-badge.easy{background:var(--easy)}
.difficulty-badge.med{background:var(--med)}
.difficulty-badge.hard{background:var(--hard)}
/* Question */
.question-display{
  background:rgba(255,255,255,.08);
  border-radius:12px;
  padding:20px;text-align:center;
  margin-bottom:16px;
}
.question-expr{
  font-size:2rem;font-weight:900;
  letter-spacing:2px;
  color:#fff;
  word-break:break-all;
}
.question-unit{
  font-size:.85rem;color:rgba(255,255,255,.6);
  margin-top:6px;
}
/* Input */
.input-area{text-align:center}
.calc-input{
  width:100%;max-width:280px;
  font-size:1.8rem;font-weight:700;
  padding:12px;text-align:center;
  border:3px solid rgba(255,255,255,.2);
  border-radius:10px;
  background:rgba(255,255,255,.05);
  color:#fff;font-family:inherit;
  letter-spacing:2px;
}
.calc-input:focus{outline:none;border-color:var(--accent)}
.hint-text{font-size:.78rem;color:rgba(255,255,255,.4);margin-top:6px}
/* Keys */
.keyboard{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:8px;max-width:340px;margin:16px auto 0}
.key{
  padding:14px 0;border:none;border-radius:10px;
  font-size:1.2rem;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.1);color:#fff;
  transition:background .1s,transform .1s;font-family:inherit;
}
.key:hover{background:rgba(255,255,255,.2)}
.key:active{transform:scale(.95)}
.key.clear{background:#e74c3c}
.key.del{background:#e67e22}
.key.submit{background:var(--accent);grid-column:span 2;font-size:1.1rem}
.key.next{background:var(--teal);grid-column:span 3}
/* Result */
.result-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.85);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:16px;
}
.result-correct{color:var(--easy)}
.result-wrong{color:var(--hard)}
.result-icon{font-size:4rem}
/* End screen */
.end-area{padding:24px;text-align:center;display:none}
.end-area h2{font-size:1.4rem;color:var(--gold);margin-bottom:16px}
.final-score{font-size:3rem;font-weight:900;color:#fff;margin-bottom:8px}
.final-detail{color:rgba(255,255,255,.6);font-size:.9rem;margin-bottom:20px}
.stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.stat{text-align:center}
.stat-n{font-size:1.6rem;font-weight:900}
.stat-l{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px}
.play-again{
  background:var(--accent);color:#fff;
  border:none;padding:14px 32px;border-radius:10px;
  font-size:1.1rem;font-weight:700;cursor:pointer;
  font-family:inherit;transition:transform .15s;
}
.play-again:hover{transform:translateY(-2px)}
/* Name input */
.name-area{padding:24px;text-align:center;display:none}
.name-area h2{font-size:1.2rem;margin-bottom:12px;color:var(--gold)}
.name-input{
  width:100%;max-width:260px;
  padding:12px;font-size:1rem;text-align:center;
  border:2px solid rgba(255,255,255,.2);
  border-radius:8px;background:rgba(255,255,255,.05);
  color:#fff;font-family:inherit;margin-bottom:12px;
}
.name-input:focus{outline:none;border-color:var(--accent)}
.name-hint{font-size:.78rem;color:rgba(255,255,255,.4);margin-bottom:16px}
.name-submit{
  background:var(--accent);color:#fff;
  border:none;padding:12px 28px;border-radius:8px;
  font-size:1rem;font-weight:700;cursor:pointer;
  font-family:inherit;
}
/* Loading */
.loading{padding:40px;text-align:center;color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <h1>🧮 計算機大賽</h1>
    <p>60秒快問快答！</p>
  </div>

  <!-- Mode tabs -->
  <div class="tab-bar" id="tabBar">
    <button class="tab active" id="tabCalc" onclick="selectMode('calc')">🧮 使用計算機</button>
    <button class="tab" id="tabBrain" onclick="selectMode('brain')">🧠 不使用計算機</button>
  </div>

  <!-- Grade select -->
  <div class="mode-select" id="modeSelect">
    <h2>🎯 選擇年級</h2>
    <div class="modes">
      <button class="mode-btn easy" onclick="startGame('S1')">中一</button>
      <button class="mode-btn easy" onclick="startGame('S2')">中二</button>
      <button class="mode-btn med" onclick="startGame('S3')">中三</button>
      <button class="mode-btn hard" onclick="startGame('S4')">中四</button>
      <button class="mode-btn hard" onclick="startGame('S5')">中五</button>
      <button class="mode-btn hard" onclick="startGame('S6')">中六</button>
    </div>
  </div>

  <!-- Leaderboard -->
  <div id="leaderboardArea" style="padding:0 24px 24px">
    <h3 style="color:var(--gold);font-size:1rem;margin-bottom:12px;text-align:center" id="leaderboardTitle">🏆 各級龍虎榜</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px" id="leaderboardGrid"></div>
  </div>

  <!-- Game Area -->
  <div class="game-area" id="gameArea">
    <div class="timer-bar" id="timerBar">
      <span class="timer-label">⏱️ 時間</span>
      <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
      <span class="timer-text" id="timerText">60</span>
    </div>
    <div class="score-board">
      <span>✅ <span class="score-pos" id="correctCount">0</span></span>
      <span id="diffBadge" class="difficulty-badge easy">中一</span>
      <span>❌ <span class="score-neg" id="wrongCount">0</span></span>
    </div>
    <div class="question-display">
      <div class="question-expr" id="questionExpr">7 × 190</div>
      <div class="question-unit" id="questionNote">答案是多少？</div>
    </div>
    <div class="input-area">
      <input type="text" class="calc-input" id="calcInput" placeholder="?" autocomplete="off">
      <div class="hint-text" id="gameHint">使用計算機計算上述算式，輸入答案後按提交</div>
    </div>
    <div class="keyboard" id="keyboard">
      <!-- Row 1: C DEL (col 3 blank) Submit (col 3-4) -->
      <button class="key clear" onclick="typeKey('clear')">C</button>
      <button class="key del" onclick="typeKey('del')">DEL</button>
      <button class="key submit" onclick="submitAns()" style="grid-column:3/5">✓ 提交答案</button>
      <button class="key" style="visibility:hidden"></button>
      <!-- Row 2: 7 8 9 . -->
      <button class="key" onclick="typeKey('7')">7</button>
      <button class="key" onclick="typeKey('8')">8</button>
      <button class="key" onclick="typeKey('9')">9</button>
      <button class="key" onclick="typeKey('.')">.</button>
      <!-- Row 3: 4 5 6 ± -->
      <button class="key" onclick="typeKey('4')">4</button>
      <button class="key" onclick="typeKey('5')">5</button>
      <button class="key" onclick="typeKey('6')">6</button>
      <button class="key" onclick="typeKey('-')">±</button>
      <!-- Row 4: 1 2 3 (col 4 blank) → 0(2) will auto go to next row which wraps... -->
      <!-- Instead: explicit col placement for 0 -->
      <button class="key" onclick="typeKey('1')">1</button>
      <button class="key" onclick="typeKey('2')">2</button>
      <button class="key" onclick="typeKey('3')">3</button>
      <button class="key" onclick="typeKey('0')" style="grid-column:3/5">0</button>
    </div>
  </div>

  <!-- End Screen -->
  <div class="end-area" id="endArea">
    <h2>⏱️ 時間到！</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-detail">最終得分</div>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-n result-correct" id="finalCorrect">0</div>
        <div class="stat-l">答對</div>
      </div>
      <div class="stat">
        <div class="stat-n result-wrong" id="finalWrong">0</div>
        <div class="stat-l">答錯</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="finalAccuracy">0%</div>
        <div class="stat-l">準確率</div>
      </div>
    </div>
    <button class="play-again" onclick="goHome()">返回首頁</button>
  </div>
</div>

<script>
// ============================================================
// Calculator Game — SPEC
// ============================================================
// - 60-second timed challenge
// - Shows calculator expression, student uses CASIO fx50FHII to compute
// - Input answer via on-screen keypad or keyboard
// - Scoring: +1 correct, -1 wrong
// - Difficulty: Easy (300), Medium (200), Hard (100), or Mixed
// - Questions from calculator_questions_full_FIXED.csv
// - At end: optional name entry to "upload" to leaderboard
// - Leaderboard stored in localStorage (mock for now)
// ============================================================

const GAME_DURATION = 60;
const STORAGE_KEY = 'calc_race_scores';

let questions = [];
let gameGrade = 'S1';
let gameTimer = null;
let gameCalcMode = 'calc'; // 'calc' = needs calculator (3sf), 'brain' = exact answer
let timeLeft = GAME_DURATION;
let correctCount = 0;
let wrongCount = 0;
let currentQ = null;
let answered = false;
let questionsLoaded = false;

// Built-in question set (40 questions — enough for demo)
// needsCalc: true = use calculator (3sf answer), false = exact answer
const BUILTIN_QUESTIONS = [
  // Easy - exact answers (no calculator needed)
  {id:'calc-0001',expression:'7*190',answer:1330,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0002',expression:'11.238*36.85',answer:414,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0003',expression:'2**5',answer:32,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0004',expression:'8-24',answer:-16,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0005',expression:'25.317*1.424',answer:36.1,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0006',expression:'35.829*35.096',answer:1258,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0007',expression:'sqrt(9)',answer:3,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0008',expression:'sqrt(36)',answer:6,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0009',expression:'2*12/100',answer:0.24,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0010',expression:'sqrt(16)',answer:4,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0011',expression:'40*15/100',answer:6,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0012',expression:'27*10/100',answer:2.7,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0013',expression:'sqrt(4)',answer:2,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0014',expression:'89*20/100',answer:17.8,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0015',expression:'187+118',answer:305,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0016',expression:'5**4',answer:625,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0017',expression:'4**2',answer:16,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0018',expression:'170*59',answer:10030,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0019',expression:'150+78',answer:228,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0020',expression:'234-87',answer:147,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0021',expression:'12*45',answer:540,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0022',expression:'144/12',answer:12,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0023',expression:'sqrt(144)',answer:12,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0024',expression:'18*25',answer:450,difficulty:'Easy',topics:'basic',needsCalc:false},
  {id:'calc-0025',expression:'96/8',answer:12,difficulty:'Easy',topics:'basic',needsCalc:false},
  // Medium - needs calculator (3sf)
  {id:'calc-0201',expression:'sqrt(2)',answer:1.414,difficulty:'Medium',topics:'intermediate',needsCalc:true,note:'[deg]'},
  {id:'calc-0202',expression:'sqrt(3)',answer:1.732,difficulty:'Medium',topics:'intermediate',needsCalc:true,note:'[deg]'},
  {id:'calc-0203',expression:'sqrt(5)',answer:2.236,difficulty:'Medium',topics:'intermediate',needsCalc:true,note:'[deg]'},
  {id:'calc-0204',expression:'log10(100)',answer:2,difficulty:'Medium',topics:'intermediate',needsCalc:true,note:'[deg]'},
  {id:'calc-0205',expression:'sin(30)',answer:0.5,difficulty:'Medium',topics:'intermediate',needsCalc:true,note:'[deg]'},
  {id:'calc-0206',expression:'cos(60)',answer:0.5,difficulty:'Medium',topics:'intermediate',needsCalc:true,note:'[deg]'},
  {id:'calc-0207',expression:'tan(45)',answer:1,difficulty:'Medium',topics:'intermediate',needsCalc:true,note:'[deg]'},
  {id:'calc-0208',expression:'13/6*100',answer:216.67,difficulty:'Medium',topics:'intermediate',needsCalc:true},
  {id:'calc-0209',expression:'sqrt(71)',answer:8.426,difficulty:'Medium',topics:'intermediate',needsCalc:true},
  {id:'calc-0210',expression:'ln(7)',answer:1.946,difficulty:'Medium',topics:'intermediate',needsCalc:true},
  {id:'calc-0211',expression:'log10(250)',answer:2.398,difficulty:'Medium',topics:'intermediate',needsCalc:true},
  {id:'calc-0212',expression:'log10(50)',answer:1.699,difficulty:'Medium',topics:'intermediate',needsCalc:true},
  {id:'calc-0213',expression:'ln(50)',answer:3.912,difficulty:'Medium',topics:'intermediate',needsCalc:true},
  {id:'calc-0214',expression:'sin(45)',answer:0.7071,difficulty:'Medium',topics:'intermediate',needsCalc:true,note:'[deg]'},
  // Hard - needs calculator (3sf)
  {id:'calc-0401',expression:'sin(75)+cos(30)',answer:1.573,difficulty:'Hard',topics:'advanced',needsCalc:true,note:'[deg]'},
  {id:'calc-0402',expression:'(3+4*5)/(2+3)*sqrt(7)',answer:6.633,difficulty:'Hard',topics:'advanced',needsCalc:true},
  {id:'calc-0403',expression:'arctan(1)',answer:45,difficulty:'Hard',topics:'advanced',needsCalc:true,note:'[deg]'},
  {id:'calc-0404',expression:'(pi+e)*2',answer:8.539,difficulty:'Hard',topics:'advanced',needsCalc:true},
  {id:'calc-0405',expression:'(pi+e)*3/2',answer:6.404,difficulty:'Hard',topics:'advanced',needsCalc:true},
  {id:'calc-0406',expression:'(pi+e)*5/2',answer:10.73,difficulty:'Hard',topics:'advanced',needsCalc:true},
  {id:'calc-0407',expression:'ln(482+e*1)',answer:6.477,difficulty:'Hard',topics:'advanced',needsCalc:true},
];

function loadQuestions() {
  // Use built-in questions immediately
  questions = BUILTIN_QUESTIONS;
  questionsLoaded = true;
}

function getFilteredQuestions(grade) {
  // Filter by calc mode: 'calc' = needs calculator (needsCalc:true), 'brain' = exact (needsCalc:false)
  return questions.filter(q => q.needsCalc === (gameCalcMode === 'calc'));
}

function formatExpression(expr) {
  // Convert to LaTeX, wrap in \( \) for MathJax inline rendering
  let latex = expr
    // Scientific notation: 1.33e+03 → 1.33\times10^{3}
    .replace(/(\d+\.?\d*)e\+(\d+)/gi, '$1\\times10^{$2}')
    .replace(/(\d+\.?\d*)e-(\d+)/gi, '$1\\times10^{-$2}')
    // Powers: 2**5 → 2^5
    .replace(/\*\*/g, '^')
    // Multiplication: * → \times
    .replace(/\*/g, '\\times ')
    // Square root: sqrt(x) → \sqrt{x}
    .replace(/sqrt\(([^)]+)\)/g, '\\sqrt{$1}')
    // n-th root: **()^(1/n) → \sqrt[n]{...}
    // Basic: already covered by power
    // log10: → \log_{10}
    .replace(/log10\(([^)]+)\)/g, '\\log_{10}($1)')
    // ln → \ln
    .replace(/ln\(([^)]+)\)/g, '\\ln($1)')
    // sin/cos/tan/arctan → \sin etc
    .replace(/sin\(/g, '\\sin(')
    .replace(/cos\(/g, '\\cos(')
    .replace(/tan\(/g, '\\tan(')
    .replace(/arctan\(/g, '\\arctan(')
    // Degree marker: sin(45)[deg] → \sin 45° (LaTeX text degree)
    // Use \text{°} for upright degree symbol in MathJax
    .replace(/(\d+\.?\d*)\[deg\]/g, '$1^{°}')
    .replace(/\[deg\]/g, '^{°}')
    // π constant
    .replace(/\bpi\b/g, '\\pi')
    // e constant (Euler's number) — only standalone, not followed by digits
    // keep regular 'e'
    // Clean up double spaces
    .replace(/\s+/g, ' ')
    .trim();
  return latex;
}

function getLatexForDisplay(expr) {
  // Returns LaTeX string for KaTeX rendering (no delimiters needed)
  return formatExpression(expr);
}

function getNote(q) {
  if (q.note && q.note.includes('deg')) return '注意：使用 DEG 模式（角度制）';
  if (/sin|cos|tan|arctan/.test(q.expression)) return '注意：使用 DEG 模式（角度制）';
  return '使用 CASIO fx50FHII 計算';
}

function nextQuestion() {
  const pool = getFilteredQuestions(gameGrade);
  if (pool.length === 0) return;
  const q = pool[Math.floor(Math.random() * pool.length)];
  currentQ = q;
  answered = false;
  document.getElementById('questionExpr').innerHTML = '';
  document.getElementById('questionNote').textContent = getNote(q);
  katex.render(getLatexForDisplay(q.expression), document.getElementById('questionExpr'), {
    throwOnError: false, displayMode: false
  });
  document.getElementById('calcInput').value = '';
  document.getElementById('calcInput').focus();

  const gradeNames = {S1:'中一', S2:'中二', S3:'中三', S4:'中四', S5:'中五', S6:'中六'};
  const badge = document.getElementById('diffBadge');
  badge.className = 'difficulty-badge ' + (q.difficulty === 'Easy' ? 'easy' : q.difficulty === 'Medium' ? 'med' : 'hard');
  badge.textContent = gradeNames[gameGrade] || gameGrade;
}

function startTimer() {
  timeLeft = GAME_DURATION;
  updateTimerDisplay();
  gameTimer = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(gameTimer);
      endGame();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const fill = document.getElementById('timerFill');
  const text = document.getElementById('timerText');
  const bar = document.getElementById('timerBar');
  fill.style.width = (timeLeft / GAME_DURATION * 100) + '%';
  text.textContent = timeLeft;
  if (timeLeft <= 10) {
    bar.classList.add('timer-warning');
  } else {
    bar.classList.remove('timer-warning');
  }
}

function submitAns() {
  if (answered) return;
  answered = true;
  const input = document.getElementById('calcInput').value.trim();
  if (!input) return;

  const userAns = parseFloat(input.replace(/,/g, ''));
  const correctAns = currentQ.answer;

  // Allow 2% tolerance for floating point
  const tolerance = Math.abs(correctAns * 0.02);
  const isCorrect = Math.abs(userAns - correctAns) <= tolerance;

  if (isCorrect) {
    correctCount++;
    showResult(true);
  } else {
    wrongCount++;
    showResult(false, correctAns);
  }

  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;

  document.getElementById('calcInput').disabled = true;
  setTimeout(() => {
    document.getElementById('calcInput').disabled = false;
    document.getElementById('calcInput').focus();
    nextQuestion();
  }, 800);
}

function formatAnswer(ans) {
  // Format answer for display: plain number or LaTeX scientific notation
  if (typeof ans !== 'number' || isNaN(ans)) return String(ans);
  // If large number or scientific notation, show in nice format
  const s = String(ans);
  if (s.includes('e+') || s.includes('e-')) {
    const parts = s.split('e');
    const base = parseFloat(parts[0]);
    const exp = parseInt(parts[1]);
    if (parts[0].includes('.')) {
      // 3sf display
      return `\\( ${base.toFixed(3)}\\times10^{${exp}}} \\)`;
    }
    return `\\( ${base}\\times10^{${exp}}} \\)`;
  }
  // Regular number
  if (Number.isInteger(ans)) return String(ans);
  return String(ans.toFixed(3));
}

function showResult(correct, correctAns) {
  const inp = document.getElementById('calcInput');
  if (correct) {
    inp.style.borderColor = '#2ecc71';
    inp.style.background = 'rgba(46,204,113,.15)';
  } else {
    inp.style.borderColor = '#e74c3c';
    inp.style.background = 'rgba(231,76,60,.15)';
    // Show correct answer in the note area
    const note = document.getElementById('questionNote');
    note.style.color = '#f1c40f';
    note.textContent = '正確答案：' + correctAns;
  }
  setTimeout(() => {
    inp.style.borderColor = '';
    inp.style.background = '';
    inp.value = '';
    inp.disabled = false;
    document.getElementById('questionNote').textContent = getNote(window.currentQ || {expression:'',note:''});
    document.getElementById('questionNote').style.color = '';
  }, 800);
}

function typeKey(k) {
  const inp = document.getElementById('calcInput');
  if (k === 'clear') {
    inp.value = '';
  } else if (k === 'del') {
    inp.value = inp.value.slice(0, -1);
  } else if (k === '-') {
    if (inp.value.startsWith('-')) inp.value = inp.value.slice(1);
    else inp.value = '-' + inp.value;
  } else {
    inp.value += k;
  }
  inp.focus();
}

function endGame() {
  const score = correctCount - wrongCount;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalCorrect').textContent = correctCount;
  document.getElementById('finalWrong').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const acc = total > 0 ? Math.round(correctCount / total * 100) : 0;
  document.getElementById('finalAccuracy').textContent = acc + '%';
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('tabBar').style.display = 'none';
  document.getElementById('endArea').style.display = 'block';
}

function startGame(grade) {
  gameGrade = grade;
  correctCount = 0;
  wrongCount = 0;
  document.getElementById('correctCount').textContent = '0';
  document.getElementById('wrongCount').textContent = '0';
  document.getElementById('modeSelect').style.display = 'none';
  document.getElementById('leaderboardArea').style.display = 'none';
  document.getElementById('tabBar').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('endArea').style.display = 'none';
  const hint = document.getElementById('gameHint');
  if (hint) hint.textContent = gameCalcMode === 'calc' ? '使用計算機計算上述算式，輸入答案後按提交' : '心算回答上述算式，輸入答案後按提交';
  nextQuestion();
  startTimer();

  document.getElementById('calcInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAns();
  });
}

function playAgain() {
  goHome();
}

function goHome() {
  document.getElementById('endArea').style.display = 'none';
  document.getElementById('modeSelect').style.display = 'block';
  document.getElementById('leaderboardArea').style.display = 'block';
  document.getElementById('tabBar').style.display = 'flex';
  if (gameTimer) clearInterval(gameTimer);
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (document.getElementById('gameArea').style.display === 'none') return;
  if (e.key === 'Enter' && !answered) submitAns();
  if (/^[0-9.]$/.test(e.key)) typeKey(e.key);
  if (e.key === 'Backspace') typeKey('del');
  if (e.key === 'Escape') typeKey('clear');
});

// Init
loadQuestions();
document.getElementById('leaderboardTitle').textContent = '🏆 使用計算機 各級龍虎榜';
renderLeaderboard();

function selectMode(mode) {
  gameCalcMode = mode;
  document.getElementById('tabCalc').classList.toggle('active', mode === 'calc');
  document.getElementById('tabBrain').classList.toggle('active', mode === 'brain');
  const title = document.getElementById('leaderboardTitle');
  if (title) title.textContent = mode === 'calc' ? '🏆 使用計算機 各級龍虎榜' : '🏆 不使用計算機 各級龍虎榜';
  const hint = document.getElementById('gameHint');
  if (hint) hint.textContent = mode === 'calc' ? '使用計算機計算上述算式，輸入答案後按提交' : '心算回答上述算式，輸入答案後按提交';
  renderLeaderboard();
}

function renderLeaderboard() {
  const grades = ['S1','S2','S3','S4','S5','S6'];
  const gradeNames = {S1:'中一',S2:'中二',S3:'中三',S4:'中四',S5:'中五',S6:'中六'};
  const colors = {S1:'#2ecc71',S2:'#27ae60',S3:'#f39c12',S4:'#e67e22',S5:'#e74c3c',S6:'#c0392b'};
  const scores = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').filter(s => s.mode === gameCalcMode);
  const grid = document.getElementById('leaderboardGrid');
  if (!grid) return;
  grid.innerHTML = '';
  grades.forEach(g => {
    const top = scores.filter(s => s.grade === g).sort((a,b) => b.score - a.score).slice(0,3);
    const col = document.createElement('div');
    col.style.cssText = 'background:rgba(255,255,255,.05);border-radius:10px;padding:10px';
    let html = `<div style="color:${colors[g]};font-weight:700;font-size:.9rem;margin-bottom:6px">${gradeNames[g]}</div>`;
    if (top.length === 0) {
      html += '<div style="color:rgba(255,255,255,.3);font-size:.75rem">暫無記錄</div>';
    } else {
      top.forEach((s,i) => {
        html += `<div style="display:flex;justify-content:space-between;font-size:.78rem;color:rgba(255,255,255,.7);margin:3px 0">
          <span>${i+1}. ${escapeHtml(s.name)}</span>
          <span style="color:${colors[g]};font-weight:700">${s.score}</span>
        </div>`;
      });
    }
    col.innerHTML = html;
    grid.appendChild(col);
  });
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
