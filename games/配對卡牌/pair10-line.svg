<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="100%" height="100%" fill="#fff"/>
  <!-- grid -->
  <g stroke="#eee">
    <line x1="100" y1="50" x2="100" y2="750" />
    <line x1="180" y1="50" x2="180" y2="750" />
    <line x1="260" y1="50" x2="260" y2="750" />
    <line x1="340" y1="50" x2="340" y2="750" />
    <line x1="420" y1="50" x2="420" y2="750" />
    <line x1="500" y1="50" x2="500" y2="750" />
    <line x1="580" y1="50" x2="580" y2="750" />
    <line x1="660" y1="50" x2="660" y2="750" />
  </g>
  <line x1="50" y1="400" x2="750" y2="400" stroke="#333" stroke-width="3"/>
  <line x1="400" y1="50" x2="400" y2="750" stroke="#333" stroke-width="3"/>
  <!-- line y=2x+1 approx -->
  <line x1="150" y1="-50" x2="650" y2="-750" stroke="#2b8cff" stroke-width="3" transform="translate(0,800) scale(1,-1)" />
  <circle cx="520" cy="120" r="6" fill="#2b8cff"/><text x="540" y="120" fill="#000">(1,3)</text>
  <circle cx="400" cy="200" r="6" fill="#2b8cff"/><text x="420" y="200" fill="#000">(0,1)</text>
  <text x="400" y="70" font-size="22" text-anchor="middle" fill="#000">Line: y = 2x + 1</text>
</svg>