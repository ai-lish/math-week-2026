<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>Ch8 統計（一）— 統計圖配對卡牌</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:#f0f4f8;padding:20px}
  h1{text-align:center;color:#1a3a6e;margin-bottom:6px}
  p.sub{text-align:center;color:#666;margin-bottom:20px;font-size:.9rem}
  .controls{text-align:center;margin-bottom:20px}
  .controls button{padding:8px 20px;border:none;border-radius:20px;cursor:pointer;font-weight:600;background:#1a3a6e;color:white}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;max-width:1100px;margin:0 auto}
  .card-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:white;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
  .card-row h3{grid-column:1/-1;color:#1a3a6e;font-size:.95rem;border-bottom:2px solid #1a3a6e;padding-bottom:5px;margin-bottom:4px}
  .algebra-card,.graph-card{border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;text-align:center}
  .algebra-card{background:#e8f0fe;border:2px solid #5a8fd4}
  .graph-card{background:#f0faf4;border:2px solid #4aaa6a}
  .card-label{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .card-content{font-size:1.35rem;font-weight:700;color:#1a3a6e}
  .card-graph svg{width:100%;height:auto;max-height:150px}
  @media print{body{background:white}.controls{display:none}.card-row{break-inside:avoid}}
</style>
</head>
<body>
<h1>📊 Ch8 統計（一）— 統計圖配對卡牌</h1>
<p class="sub">棒形圖 · 圓形圖 · 折線圖 · 幹葉圖</p>
<div class="controls"><button onclick="window.print()">🖨️ 列印全部卡牌</button></div>

<div class="grid">

  <!-- 棒形圖 -->
  <div class="card-row">
    <h3>棒形圖：四科成績比較</h3>
    <div class="algebra-card">
      <div class="card-label">📐 數據（分數）</div>
      <div class="card-content">數：85　英：72　常：90　美：65</div>
    </div>
    <div class="graph-card">
      <div class="card-label">🖼️ 棒形圖</div>
      <div class="card-graph">
        <svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <!-- axes -->
          <line x1="40" y1="130" x2="280" y2="130" stroke="#333" stroke-width="2"/>
          <line x1="40" y1="130" x2="40" y2="20" stroke="#333" stroke-width="2"/>
          <!-- bars -->
          <rect x="60" y="36" width="35" height="94" fill="#5a8fd4" rx="3"/>
          <rect x="115" y="49" width="35" height="81" fill="#4aaa6a" rx="3"/>
          <rect x="170" y="30" width="35" height="100" fill="#e65555" rx="3"/>
          <rect x="225" y="60" width="35" height="70" fill="#ffd700" rx="3"/>
          <!-- labels -->
          <text x="77" y="148" font-size="11" text-anchor="middle" fill="#1a3a6e">數</text>
          <text x="132" y="148" font-size="11" text-anchor="middle" fill="#1a3a6e">英</text>
          <text x="187" y="148" font-size="11" text-anchor="middle" fill="#1a3a6e">常</text>
          <text x="242" y="148" font-size="11" text-anchor="middle" fill="#1a3a6e">美</text>
          <!-- values on top -->
          <text x="77" y="32" font-size="10" text-anchor="middle" fill="#1a3a6e">85</text>
          <text x="132" y="45" font-size="10" text-anchor="middle" fill="#1a3a6e">72</text>
          <text x="187" y="26" font-size="10" text-anchor="middle" fill="#1a3a6e">90</text>
          <text x="242" y="56" font-size="10" text-anchor="middle" fill="#1a3a6e">65</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- 圓形圖 -->
  <div class="card-row">
    <h3>圓形圖：時間分配（24小時）</h3>
    <div class="algebra-card">
      <div class="card-label">📐 數據（時數）</div>
      <div class="card-content">睡：8h　學：8h　玩：4h　其：4h</div>
    </div>
    <div class="graph-card">
      <div class="card-label">🖼️ 圓形圖</div>
      <div class="card-graph">
        <svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <circle cx="130" cy="80" r="65" fill="#f7fbff" stroke="#1a3a6e" stroke-width="2"/>
          <!-- Sleep 8h = 120deg -->
          <path d="M130,80 L130,15 A65,65 0 0,1 186,120 Z" fill="#5a8fd4"/>
          <!-- Study 8h = 120deg -->
          <path d="M130,80 L186,120 A65,65 0 0,1 74,120 Z" fill="#4aaa6a"/>
          <!-- Play 4h = 60deg -->
          <path d="M130,80 L74,120 A65,65 0 0,1 45,80 Z" fill="#e65555"/>
          <!-- Others 4h = 60deg -->
          <path d="M130,80 L45,80 A65,65 0 0,1 130,15 Z" fill="#ffd700"/>
          <!-- center -->
          <circle cx="130" cy="80" r="25" fill="white" stroke="#1a3a6e" stroke-width="1.5"/>
          <text x="130" y="77" font-size="9" text-anchor="middle" fill="#1a3a6e">24小時</text>
          <text x="130" y="90" font-size="9" text-anchor="middle" fill="#888">分配</text>
          <!-- legend -->
          <text x="210" y="40" font-size="10" fill="#5a8fd4">■ 睡 8h</text>
          <text x="210" y="58" font-size="10" fill="#4aaa6a">■ 學 8h</text>
          <text x="210" y="76" font-size="10" fill="#e65555">■ 玩 4h</text>
          <text x="210" y="94" font-size="10" fill="#c8960c">■ 其 4h</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- 折線圖 -->
  <div class="card-row">
    <h3>折線圖：一週體溫變化</h3>
    <div class="algebra-card">
      <div class="card-label">📐 數據（°C）</div>
      <div class="card-content">一:36.5　二:36.8　三:37.1　四:37.2　五:36.9</div>
    </div>
    <div class="graph-card">
      <div class="card-label">🖼️ 折線圖</div>
      <div class="card-graph">
        <svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <line x1="30" y1="130" x2="280" y2="130" stroke="#333" stroke-width="2"/>
          <line x1="30" y1="130" x2="30" y2="20" stroke="#333" stroke-width="2"/>
          <!-- y axis labels -->
          <text x="22" y="130" font-size="9" text-anchor="end" fill="#888">36</text>
          <text x="22" y="90" font-size="9" text-anchor="end" fill="#888">37</text>
          <!-- line segments -->
          <polyline points="50,100 100,80 150,65 200,58 250,75" fill="none" stroke="#e65555" stroke-width="2.5"/>
          <!-- dots -->
          <circle cx="50" cy="100" r="5" fill="#e65555"/>
          <circle cx="100" cy="80" r="5" fill="#e65555"/>
          <circle cx="150" cy="65" r="5" fill="#e65555"/>
          <circle cx="200" cy="58" r="5" fill="#e65555"/>
          <circle cx="250" cy="75" r="5" fill="#e65555"/>
          <!-- labels -->
          <text x="50" y="148" font-size="10" text-anchor="middle" fill="#1a3a6e">一</text>
          <text x="100" y="148" font-size="10" text-anchor="middle" fill="#1a3a6e">二</text>
          <text x="150" y="148" font-size="10" text-anchor="middle" fill="#1a3a6e">三</text>
          <text x="200" y="148" font-size="10" text-anchor="middle" fill="#1a3a6e">四</text>
          <text x="250" y="148" font-size="10" text-anchor="middle" fill="#1a3a6e">五</text>
          <!-- value labels -->
          <text x="50" y="96" font-size="9" text-anchor="middle" fill="#888">36.5</text>
          <text x="100" y="76" font-size="9" text-anchor="middle" fill="#888">36.8</text>
          <text x="150" y="61" font-size="9" text-anchor="middle" fill="#888">37.1</text>
          <text x="200" y="54" font-size="9" text-anchor="middle" fill="#888">37.2</text>
          <text x="250" y="71" font-size="9" text-anchor="middle" fill="#888">36.9</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- 幹葉圖 -->
  <div class="card-row">
    <h3>幹葉圖：學生年齡分佈</h3>
    <div class="algebra-card">
      <div class="card-label">📐 數據</div>
      <div class="card-content">莖=十位 11,12,12,13,13,13,14,15,16</div>
    </div>
    <div class="graph-card">
      <div class="card-label">🖼️ 幹葉圖</div>
      <div class="card-graph">
        <svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <!-- header -->
          <text x="150" y="20" font-size="13" text-anchor="middle" fill="#1a3a6e" font-weight="bold">學生年齡幹葉圖</text>
          <!-- stem column -->
          <rect x="90" y="35" width="30" height="115" fill="#e8f0fe" stroke="#1a3a6e" stroke-width="2"/>
          <text x="105" y="57" font-size="14" text-anchor="middle" fill="#1a3a6e" font-weight="bold">1</text>
          <text x="105" y="80" font-size="14" text-anchor="middle" fill="#1a3a6e" font-weight="bold">2</text>
          <text x="105" y="103" font-size="14" text-anchor="middle" fill="#1a3a6e" font-weight="bold">3</text>
          <text x="105" y="126" font-size="14" text-anchor="middle" fill="#1a3a6e" font-weight="bold">4</text>
          <!-- leaves -->
          <text x="130" y="57" font-size="13" text-anchor="middle" fill="#5a8fd4">1</text>
          <text x="145" y="80" font-size="13" text-anchor="middle" fill="#4aaa6a">2</text>
          <text x="160" y="80" font-size="13" text-anchor="middle" fill="#4aaa6a">2</text>
          <text x="175" y="103" font-size="13" text-anchor="middle" fill="#e65555">3</text>
          <text x="190" y="103" font-size="13" text-anchor="middle" fill="#e65555">3</text>
          <text x="205" y="103" font-size="13" text-anchor="middle" fill="#e65555">3</text>
          <text x="220" y="126" font-size="13" text-anchor="middle" fill="#ffd700">5</text>
          <!-- key -->
          <text x="150" y="155" font-size="10" text-anchor="middle" fill="#888">莖 1 | 葉 1 = 11歲</text>
        </svg>
      </div>
    </div>
  </div>

</div>
</body>
</html>
