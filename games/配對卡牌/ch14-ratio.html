<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>Ch14 率、比及比例 — 配對卡牌</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:#f0f4f8;padding:20px}
  h1{text-align:center;color:#1a3a6e;margin-bottom:6px}
  p.sub{text-align:center;color:#666;margin-bottom:20px;font-size:.9rem}
  .controls{text-align:center;margin-bottom:20px}
  .controls button{padding:8px 20px;border:none;border-radius:20px;cursor:pointer;font-weight:600;background:#1a3a6e;color:white}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;max-width:1100px;margin:0 auto}
  .card-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:white;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
  .card-row h3{grid-column:1/-1;color:#1a3a6e;font-size:.95rem;border-bottom:2px solid #1a3a6e;padding-bottom:5px;margin-bottom:4px}
  .algebra-card,.graph-card{border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;text-align:center}
  .algebra-card{background:#e8f0fe;border:2px solid #5a8fd4}
  .graph-card{background:#f0faf4;border:2px solid #4aaa6a}
  .card-label{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .card-content{font-size:1.1rem;font-weight:700;color:#1a3a6e}
  .card-graph svg{width:100%;height:auto;max-height:150px}
  @media print{body{background:white}.controls{display:none}.card-row{break-inside:avoid}}
</style>
</head>
<body>
<h1>📏 Ch14 率、比及比例 — 配對卡牌</h1>
<p class="sub">比率化簡 · 比例尺地圖 · 正/反比例</p>
<div class="controls"><button onclick="window.print()">🖨️ 列印全部卡牌</button></div>

<div class="grid">

  <!-- 比率化簡 -->
  <div class="card-row">
    <h3>比率化簡：8:12 = 2:3</h3>
    <div class="algebra-card">
      <div class="card-label">📐 代數（運算）</div>
      <div class="card-content">8 : 12 = 2 : 3（除 GCD 4）</div>
    </div>
    <div class="graph-card">
      <div class="card-label">🖼️ 圖解</div>
      <div class="card-graph">
        <svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <text x="150" y="20" font-size="13" text-anchor="middle" fill="#1a3a6e" font-weight="bold">找最大公因數化簡</text>
          <!-- before -->
          <rect x="30" y="40" width="80" height="50" fill="#5a8fd4" rx="4"/>
          <rect x="110" y="40" width="120" height="50" fill="#e65555" rx="4"/>
          <text x="70" y="70" font-size="16" text-anchor="middle" fill="white" font-weight="bold">8</text>
          <text x="170" y="70" font-size="16" text-anchor="middle" fill="white" font-weight="bold">12</text>
          <!-- ÷4 -->
          <text x="150" y="105" font-size="13" text-anchor="middle" fill="#888">÷ GCD(8,12) = 4</text>
          <!-- arrow -->
          <line x1="150" y1="112" x2="150" y2="122" stroke="#5a8fd4" stroke-width="2"/>
          <polygon points="145,122 150,132 155,122" fill="#5a8fd4"/>
          <!-- after -->
          <rect x="80" y="132" width="50" height="28" fill="#5a8fd4" rx="4"/>
          <rect x="170" y="132" width="75" height="28" fill="#e65555" rx="4"/>
          <text x="105" y="151" font-size="14" text-anchor="middle" fill="white" font-weight="bold">2</text>
          <text x="207" y="151" font-size="14" text-anchor="middle" fill="white" font-weight="bold">3</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- 比例尺 -->
  <div class="card-row">
    <h3>比例尺地圖：1:5000（1cm = 50m）</h3>
    <div class="algebra-card">
      <div class="card-label">📐 代數（計算）</div>
      <div class="card-content">地圖 3cm → 實際 3×50m = 150m</div>
    </div>
    <div class="graph-card">
      <div class="card-label">🖼️ 地圖示意</div>
      <div class="card-graph">
        <svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <!-- map rectangle -->
          <rect x="50" y="30" width="200" height="80" fill="#f7fbff" stroke="#1a3a6e" stroke-width="2"/>
          <!-- grid -->
          <g stroke="#5a8fd4" stroke-width="0.8" stroke-dasharray="4,3">
            <line x1="50" y1="60" x2="250" y2="60"/>
            <line x1="50" y1="90" x2="250" y2="90"/>
            <line x1="100" y1="30" x2="100" y2="110"/>
            <line x1="150" y1="30" x2="150" y2="110"/>
            <line x1="200" y1="30" x2="200" y2="110"/>
          </g>
          <!-- measured line -->
          <line x1="50" y1="130" x2="110" y2="130" stroke="#e65555" stroke-width="3"/>
          <polygon points="110,125 120,130 110,135" fill="#e65555"/>
          <text x="80" y="148" font-size="13" text-anchor="middle" fill="#e65555" font-weight="bold">3 cm（地圖）</text>
          <!-- arrow down -->
          <line x1="150" y1="110" x2="150" y2="120" stroke="#4aaa6a" stroke-width="2"/>
          <!-- real world -->
          <rect x="60" y="130" width="240" height="0" fill="none"/>
          <text x="150" y="155" font-size="13" text-anchor="middle" fill="#4aaa6a" font-weight="bold">= 150 m（實際）</text>
          <!-- scale label -->
          <text x="150" y="22" font-size="11" text-anchor="middle" fill="#888">比例尺 1 : 5000</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- 正比例 -->
  <div class="card-row">
    <h3>正比例：速度 × 時間 = 距離（固定）</h3>
    <div class="algebra-card">
      <div class="card-label">📐 代數（關係）</div>
      <div class="card-content">v × t = d　當 v=60，t=2 → d=120km</div>
    </div>
    <div class="graph-card">
      <div class="card-label">🖼️ 圖解</div>
      <div class="card-graph">
        <svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <!-- axes -->
          <line x1="40" y1="130" x2="280" y2="130" stroke="#333" stroke-width="2"/>
          <line x1="40" y1="130" x2="40" y2="20" stroke="#333" stroke-width="2"/>
          <text x="160" y="148" font-size="11" text-anchor="middle" fill="#888">時間（小時）</text>
          <text x="20" y="75" font-size="11" text-anchor="middle" fill="#888" transform="rotate(-90 20 75)">距離(km)</text>
          <!-- straight line through origin -->
          <line x1="40" y1="130" x2="260" y2="30" stroke="#5a8fd4" stroke-width="2.5"/>
          <!-- points -->
          <circle cx="80" cy="115" r="6" fill="#e65555"/>
          <text x="80" y="110" font-size="10" text-anchor="middle" fill="#e65555">1h→60</text>
          <circle cx="120" cy="100" r="6" fill="#e65555"/>
          <text x="120" y="95" font-size="10" text-anchor="middle" fill="#e65555">2h→120</text>
          <circle cx="160" cy="85" r="6" fill="#e65555"/>
          <text x="160" y="80" font-size="10" text-anchor="middle" fill="#e65555">3h→180</text>
          <text x="150" y="22" font-size="12" text-anchor="middle" fill="#1a3a6e" font-weight="bold">正比例：過原點直線</text>
        </svg>
      </div>
    </div>
  </div>

</div>
</body>
</html>
