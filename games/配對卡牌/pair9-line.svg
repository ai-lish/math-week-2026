<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="100%" height="100%" fill="#fff"/>
  <!-- grid -->
  <g stroke="#eee">
    <!-- vertical -->
    <line x1="100" y1="50" x2="100" y2="750" />
    <line x1="180" y1="50" x2="180" y2="750" />
    <line x1="260" y1="50" x2="260" y2="750" />
    <line x1="340" y1="50" x2="340" y2="750" />
    <line x1="420" y1="50" x2="420" y2="750" />
    <line x1="500" y1="50" x2="500" y2="750" />
    <line x1="580" y1="50" x2="580" y2="750" />
    <line x1="660" y1="50" x2="660" y2="750" />
  </g>
  <!-- axes -->
  <line x1="50" y1="400" x2="750" y2="400" stroke="#333" stroke-width="3"/>
  <line x1="400" y1="50" x2="400" y2="750" stroke="#333" stroke-width="3"/>
  <!-- line y=x -->
  <line x1="150" y1="550" x2="650" y2="50" stroke="#ff5a5a" stroke-width="3"/>
  <!-- points -->
  <circle cx="500" cy="200" r="6" fill="#ff5a5a"/><text x="520" y="200" fill="#000">(1,1)</text>
  <circle cx="300" cy="400" r="6" fill="#ff5a5a"/><text x="320" y="400" fill="#000">(−1,−1)</text>
  <text x="400" y="70" font-size="22" text-anchor="middle" fill="#000">Line: y = x</text>
</svg>