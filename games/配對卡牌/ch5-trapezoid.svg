<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <!-- trapezoid -->
  <polygon points="200,200 600,200 500,400 300,400" fill="#f7fbff" stroke="#333" stroke-width="3"/>
  <!-- labels -->
  <line x1="200" y1="200" x2="600" y2="200" stroke="#333" stroke-width="1"/>
  <text x="400" y="180" font-size="20" text-anchor="middle">上底 a</text>
  <text x="400" y="420" font-size="20" text-anchor="middle">下底 b</text>
  <line x1="310" y1="200" x2="310" y2="400" stroke="#333" stroke-width="2"/>
  <text x="280" y="310" font-size="20" text-anchor="middle" transform="rotate(-90 280 310)">高度 h</text>
  <!-- right angle marker -->
  <line x1="300" y1="380" x2="320" y2="380" stroke="#333" stroke-width="2"/>
  <line x1="320" y1="380" x2="320" y2="400" stroke="#333" stroke-width="2"/>
  <text x="400" y="60" font-size="22" text-anchor="middle">梯形面積 A = 1/2 (a + b) h</text>
</svg>