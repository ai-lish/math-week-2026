<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <line x1="50" y1="400" x2="750" y2="400" stroke="#333" stroke-width="4"/>
  <!-- tick marks -->
  <g stroke="#333" stroke-width="2">
    <!-- 0 at center -->
    <line x1="400" y1="390" x2="400" y2="410"/>
    <text x="400" y="435" font-size="20" text-anchor="middle" fill="#333">0</text>
  </g>
  <!-- numbers -->
  <g font-size="18" fill="#333">
    <text x="480" y="435" text-anchor="middle">1</text>
    <text x="560" y="435" text-anchor="middle">2</text>
    <text x="640" y="435" text-anchor="middle">3</text>
    <text x="720" y="435" text-anchor="middle">4</text>
    <text x="320" y="435" text-anchor="middle">-1</text>
    <text x="240" y="435" text-anchor="middle">-2</text>
    <text x="160" y="435" text-anchor="middle">-3</text>
    <text x="80" y="435" text-anchor="middle">-4</text>
  </g>
  <!-- ticks positions -->
  <g stroke="#333" stroke-width="2">
    <!-- from x=80 to 720 step 80, center 400 -->
    <line x1="80" y1="392" x2="80" y2="408"/>
    <line x1="160" y1="392" x2="160" y2="408"/>
    <line x1="240" y1="392" x2="240" y2="408"/>
    <line x1="320" y1="392" x2="320" y2="408"/>
    <line x1="400" y1="390" x2="400" y2="410"/>
    <line x1="480" y1="392" x2="480" y2="408"/>
    <line x1="560" y1="392" x2="560" y2="408"/>
    <line x1="640" y1="392" x2="640" y2="408"/>
    <line x1="720" y1="392" x2="720" y2="408"/>
  </g>
  <!-- highlight x=4 position (x=720) -->
  <circle cx="720" cy="400" r="12" fill="#ff8c00" stroke="#cc6b00" stroke-width="2"/>
  <text x="720" y="370" font-size="22" text-anchor="middle" fill="#cc6b00">x=4</text>
  <text x="400" y="70" font-size="24" text-anchor="middle" fill="#000">Equation: x + 3 = 7 → x = 4</text>
</svg>