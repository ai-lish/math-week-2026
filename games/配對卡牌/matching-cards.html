<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 中一數學配對卡牌庫</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); min-height:100vh; padding:20px; color:white }
        h1 { text-align:center; font-size:1.6rem; color:#00d4ff; margin-bottom:6px }
        .subtitle { text-align:center; color:#bfc9d9; margin-bottom:18px }
        .controls { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:14px }
        .controls select, .controls button { padding:8px 16px; border-radius:18px; border:none; cursor:pointer; font-weight:600 }
        .btn-start { background:#00d4ff; color:#07192b }
        .btn-reset { background:#ff6b6b; color:#fff }
        .game-board { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; max-width:980px; margin:0 auto 20px }
        .card { perspective:1000px; height:170px; cursor:pointer }
        .card-inner { position:relative; width:100%; height:100%; transition:transform .45s; transform-style:preserve-3d }
        .card.flipped .card-inner { transform:rotateY(180deg) }
        .card-front,.card-back { position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:10px }
        .card-front { background:linear-gradient(135deg,#2a2a4a,#1a1a3a); border:2px solid #3a3a6a }
        .card-back { background:linear-gradient(135deg,#1a3a2a,#0a2a1a); border:2px solid #2a5a3a; transform:rotateY(180deg) }
        .card-label { font-size:0.75rem; color:#bfc9d9; margin-bottom:6px }
        .card-content { font-size:1.05rem; font-weight:700; color:#00d4ff; text-align:center }
        .card-graph { font-size:0.78rem; color:#ddd; text-align:center; line-height:1.3 }
        .card.matched .card-front, .card.matched .card-back { border-color:#00ff88; box-shadow:0 0 18px rgba(0,255,136,0.25) }
        .message { text-align:center; color:#ffd700; font-weight:700; margin:8px 0 14px; min-height:28px }
        .score-board { text-align:center; color:#cfe8ff; margin-bottom:8px }
        .legend { max-width:980px; margin:12px auto; background:rgba(255,255,255,0.04); padding:12px 16px; border-radius:10px; color:#d7e7ff }
        .legend h3 { color:#00d4ff; margin-bottom:8px }
        .legend-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:6px }
        .legend-item strong { color:#ffd700 }
        @media print { body{background:white;color:black} .controls,.message {display:none} .card{height:120px} .card-front,.card-back{background:#fff;border:1px solid #000} }
    </style>
</head>
<body>
    <h1>🎯 中一數學配對卡牌庫</h1>
    <p class="subtitle">選一個章節開始製作／列印卡牌（包含坐標、面積、全等三角形等）</p>

    <div class="controls">
        <select id="chapterSelect">
            <option value="ch10">Ch10 坐標簡介（坐標 / 直線）</option>
            <option value="ch12">Ch12 全等三角形（SAS/ASA/AAS/SSS/RHS）</option>
            <option value="ch5">Ch5 面積與體積（梯形 / 角柱）</option>
            <option value="ch6">Ch6 多項式（面積模型）</option>
            <option value="ch2">Ch2 有向數（數線）</option>
            <option value="ch11">Ch11 平行線與角</option>
        </select>
        <button class="btn-start" onclick="startGame()">🔄 產生成套卡牌</button>
        <button class="btn-reset" onclick="resetGame()">🏠 清除</button>
        <button class="btn-start" onclick="window.print()">🖨️ 列印 (紙本)</button>
    </div>

    <div class="score-board">配對次數：<span id="moves">0</span>　|　成功：<span id="matches">0</span>　|　用時：<span id="timer">0:00</span></div>
    <div class="message" id="message"></div>

    <div class="game-board" id="board"></div>

    <div class="legend"><h3>📋 配對答案（參考）</h3><div class="legend-grid" id="legend"></div></div>

<script>
// 章節卡牌資料（每對包含代數/條件 a 與圖像描述 b）
const availableChapters = {
    ch10: {
        title: 'Ch10 坐標簡介',
        cards: [
            { a: '(3, 4)', aLabel: '坐標', b: 'P 在第一象限 (3,4)', pair: 'c10-1' },
            { a: '(-2, 1)', aLabel: '坐標', b: 'Q 在第二象限 (-2,1)', pair: 'c10-2' },
            { a: '(0, 4)', aLabel: '坐標', b: 'T 在 y 軸上 (0,4)', pair: 'c10-3' },
            { a: '(-3, 0)', aLabel: '坐標', b: 'U 在 x 軸上 (-3,0)', pair: 'c10-4' },
            { a: 'y = x', aLabel: '直線', b: '直線 y=x，斜率 1，通過原點', pair: 'c10-5' },
            { a: 'y = 2x + 1', aLabel: '直線', b: '直線 y=2x+1，y 截距 1', pair: 'c10-6' }
        ]
    },
    ch12: {
        title: 'Ch12 全等三角形',
        cards: [
            { a: 'SAS', aLabel: '條件', b: '兩邊及其夾角相等 (標示兩邊與夾角)', pair: 'c12-1' },
            { a: 'ASA', aLabel: '條件', b: '兩角及其夾邊相等 (標示兩角與夾邊)', pair: 'c12-2' },
            { a: 'AAS', aLabel: '條件', b: '兩角與另一邊相等 (非夾邊)', pair: 'c12-3' },
            { a: 'SSS', aLabel: '條件', b: '三邊相等 (三邊均標記相等)', pair: 'c12-4' },
            { a: 'RHS', aLabel: '條件', b: '直角、斜邊及一邊相等 (直角三角形)', pair: 'c12-5' }
        ]
    },
    ch5: {
        title: 'Ch5 面積與體積',
        cards: [
            { a: 'A = 1/2 (a + b) h', aLabel: '梯形面積', b: '梯形：上底 a、下底 b、高 h', pair: 'c5-1' },
            { a: 'V = 底面積 × 高', aLabel: '角柱體積', b: '角柱：底面積 B、垂直高度 h', pair: 'c5-2' }
        ]
    },
    ch6: {
        title: 'Ch6 多項式（面積模型）',
        cards: [
            { a: '(x+2)(x+3)', aLabel: '代數', b: '長方形：長 (x+3)、闊 (x+2) 的面積模型', pair: 'c6-1' },
            { a: 'x^2 + 5x + 6', aLabel: '展開式', b: '展開示意：x^2 + 2x + 3x + 6', pair: 'c6-2' }
        ]
    },
    ch2: {
        title: 'Ch2 有向數（數線）',
        cards: [
            { a: '(+5) + (−3) = +2', aLabel: '算式', b: '數線：從 0 向右 5 格，再向左 3 格 到 +2', pair: 'c2-1' },
            { a: '(−4) + (−2) = −6', aLabel: '算式', b: '數線：從 0 向左 4 格，再向左 2 格 到 −6', pair: 'c2-2' }
        ]
    },
    ch11: {
        title: 'Ch11 平行線與角',
        cards: [
            { a: '同位角', aLabel: '名詞', b: '平行線被截線，對應位置角相等 (標示 a 與 a)', pair: 'c11-1' },
            { a: '內錯角', aLabel: '名詞', b: '平行線被截線，內側交錯角相等 (標示 b 與 b)', pair: 'c11-2' }
        ]
    }
};

let currentCards = [];
let flippedCards = [];
let matchedPairs = 0;
let moves = 0;
let seconds = 0;
let timerInterval = null;
let lockBoard = false;

function startGame() {
    const chap = document.getElementById('chapterSelect').value;
    const data = availableChapters[chap];
    if (!data) return;
    currentCards = shuffle(data.cards.slice());
    matchedPairs = 0; moves = 0; seconds = 0; flippedCards = []; lockBoard = false;
    clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 1000);
    renderBoard(); renderLegend(); updateScore(); document.getElementById('message').textContent = '';
}

function resetGame() { clearInterval(timerInterval); document.getElementById('board').innerHTML = ''; matchedPairs=0; moves=0; seconds=0; flippedCards=[]; document.getElementById('moves').textContent='0'; document.getElementById('matches').textContent='0'; document.getElementById('timer').textContent='0:00'; document.getElementById('message').textContent=''; }

function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function renderBoard(){ const board=document.getElementById('board'); board.innerHTML=''; currentCards.forEach((card,idx)=>{ const aCard=createCardElement(card,'a',idx*2); const bCard=createCardElement(card,'b',idx*2+1); board.appendChild(aCard); board.appendChild(bCard); }); }

function createCardElement(card, side, idx){ const div=document.createElement('div'); div.className='card'; div.dataset.pair=card.pair; div.dataset.side=side; div.dataset.idx=idx; div.onclick=()=>flipCard(div); const inner=document.createElement('div'); inner.className='card-inner'; const front=document.createElement('div'); front.className='card-front'; front.innerHTML=`<div class="card-label">⚪ 點擊翻開</div><div class="card-content">？</div>`; const back=document.createElement('div'); back.className='card-back'; if(side==='a'){ back.innerHTML=`<div class="card-label">📐 ${card.aLabel}</div><div class="card-content">${card.a}</div>`; } else { back.innerHTML=`<div class="card-label">🖼️ ${card.bLabel}</div><div class="card-graph">${card.b.replace(/\n/g,'<br>')}</div>`; } inner.appendChild(front); inner.appendChild(back); div.appendChild(inner); return div; }

function flipCard(card){ if(lockBoard) return; if(card.classList.contains('flipped')) return; if(card.classList.contains('matched')) return; if(flippedCards.length>=2) return; card.classList.add('flipped'); flippedCards.push(card); if(flippedCards.length===2){ moves++; updateScore(); checkMatch(); } }

function checkMatch(){ const [c1,c2]=flippedCards; const samePair=c1.dataset.pair===c2.dataset.pair; const diffSide=c1.dataset.side!==c2.dataset.side; if(samePair && diffSide){ c1.classList.add('matched'); c2.classList.add('matched'); flippedCards=[]; matchedPairs++; updateScore(); const totalPairs=currentCards.length; if(matchedPairs===totalPairs){ clearInterval(timerInterval); document.getElementById('message').textContent=`🎉 全部配對成功！用了 ${moves} 次，時間 ${document.getElementById('timer').textContent}`; } } else { lockBoard=true; c1.classList.add('wrong'); c2.classList.add('wrong'); setTimeout(()=>{ c1.classList.remove('flipped','wrong'); c2.classList.remove('flipped','wrong'); flippedCards=[]; lockBoard=false; },800); } }

function updateScore(){ document.getElementById('moves').textContent=moves; document.getElementById('matches').textContent=matchedPairs; }
function updateTimer(){ seconds++; const m=Math.floor(seconds/60); const s=seconds%60; document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`; }
function renderLegend(){ const legend=document.getElementById('legend'); legend.innerHTML=''; currentCards.forEach(card=>{ const item=document.createElement('div'); item.className='legend-item'; item.innerHTML=`<strong>${card.a}</strong> ↔ ${card.b.replace(/\n/g,' ')}`; legend.appendChild(item); }); }

document.addEventListener('DOMContentLoaded',()=>{ startGame(); });
</script>
</body>
</html>
