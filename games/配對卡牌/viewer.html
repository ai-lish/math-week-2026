<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 中一數學配對卡牌 — 課題瀏覽器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.header h1{font-size:1rem;color:#58a6ff;flex:1}
select{background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:7px 14px;font-size:.9rem;cursor:pointer}
.main{padding:20px 16px;max-width:1200px;margin:0 auto}
.chapter-title{color:#58a6ff;font-size:1.2rem;margin-bottom:4px}
.chapter-desc{color:#8b949e;font-size:.85rem;margin-bottom:16px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.pair{border:1px solid #30363d;border-radius:12px;overflow:hidden;background:#161b22}
.pair-header{padding:6px 12px;background:rgba(88,166,255,.06);border-bottom:1px solid #21262d;font-size:.7rem;color:#58a6ff;letter-spacing:1.5px;text-transform:uppercase}
.pair-body{display:grid;grid-template-columns:1fr 1fr;aspect-ratio:5/4;min-height:180px}
.card-algebra,.card-graph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;text-align:center}
.card-algebra{background:linear-gradient(135deg,#1a2d4a,#0f1f35);border-right:1px solid #21262d}
.card-graph{background:linear-gradient(135deg,#0f2a1f,#091510}
.card-label{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;opacity:.5}
.card-algebra .card-label{color:#79c0ff}
.card-graph .card-label{color:#56d364}
.card-text{font-size:.95rem;font-weight:700;color:#58a6ff;line-height:1.3}
.card-graph svg{width:100%;height:auto;max-height:130px}
.open-link{display:block;text-align:center;padding:12px;background:#21262d;color:#58a6ff;text-decoration:none;font-size:.82rem;border-top:1px solid #30363d}
.open-link:hover{background:#30363d}
.open-link::before{content:"📋 ";font-size:.9rem}
@media(max-width:600px){.card-grid{grid-template-columns:1fr}}
@media print{body{background:white;color:black}.header{display:none}.card-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <h1>📚 中一數學配對卡牌 — 課題瀏覽器</h1>
  <select id="sel" onchange="showChapter(this.value)">
    <option value="ch1">Ch1 — 基礎計算</option>
    <option value="ch2">Ch2 — 有向數</option>
    <option value="ch3">Ch3 — 代數式</option>
    <option value="ch4">Ch4 &amp; Ch7 — 一元一次方程</option>
    <option value="ch5">Ch5 — 面積與體積</option>
    <option value="ch6">Ch6 — 多項式</option>
    <option value="ch8">Ch8 — 統計（一）</option>
    <option value="ch9">Ch9 — 百分法</option>
    <option value="ch10">Ch10 — 坐標簡介</option>
    <option value="ch11">Ch11 — 平行線與角</option>
    <option value="ch12">Ch12 — 全等三角形</option>
    <option value="ch13">Ch13 — 數值估算</option>
    <option value="ch14">Ch14 — 率、比及比例</option>
  </select>
</div>
<div class="main" id="main"></div>
<script>

e" fill="#1a3a6e">6</text><text x="141" y="16" font-size="11" text-anchor="middle" fill="#1a3a6e">6</text><text x="12" y="52" font-size="11" text-anchor="middle" fill="#1a3a6e" transform="rotate(-90 12 52)">6</text><text x="12" y="107" font-size="11" text-anchor="middle" fill="#e65555" transform="rotate(-90 12 107)">3</text><text x="100" y="148" font-size="11" text-anchor="middle" fill="#4aaa6a">最大正方形 6×6 → HCF=6</text></svg>`},{a:"LCM(4, 6) = 12",aL:"最小公倍數",bL:"數線圖",s:`<svg viewBox="0 0 200 155"><rect width="200" height="155" fill="#fff"/><line x1="12" y1="95" x2="188" y2="95" stroke="#333" stroke-width="2"/><circle cx="40" cy="95" r="6" fill="#5a8fd4"/><circle cx="70" cy="95" r="6" fill="#5a8fd4"/><circle cx="100" cy="95" r="6" fill="#4aaa6a"/><circle cx="130" cy="95" r="6" fill="#5a8fd4"/><circle cx="160" cy="95" r="6" fill="#5a8fd4"/><text x="40" y="112" font-size="9" text-anchor="middle" fill="#5a8fd4">4</text><text x="70" y="112" font-size="9" text-anchor="middle" fill="#5a8fd4">8</text><text x="100" y="112" font-size="9" text-anchor="middle" fill="#4aaa6a">6</text><text x="130" y="112" font-size="9" text-anchor="middle" fill="#5a8fd4">12</text><circle cx="100" cy="52" r="6" fill="#4aaa6a"/><circle cx="130" cy="52" r="6" fill="#4aaa6a"/><text x="100" y="46" font-size="9" text-anchor="middle" fill="#4aaa6a">6</text><text x="130" y="46" font-size="9" text-anchor="middle" fill="#4aaa6a">12</text><circle cx="130" cy="95" r="10" fill="#ffd700" stroke="#1a3a6e" stroke-width="2"/><text x="130" y="100" font-size="11" text-anchor="middle" fill="#1a3a6e" font-weight="bold">12</text><text x="100" y="148" font-size="10" text-anchor="middle" fill="#4aaa6a">首次共同 → LCM=12</text></svg>`},{a:"72 可被 4, 6, 8, 9 整除",aL:"整除性判別",bL:"判別圖",s:`<svg viewBox="0 0 200 155"><rect width="200" height="155" fill="#fff"/><circle cx="100" cy="75" r="45" fill="#ffd700" stroke="#1a3a6e" stroke-width="2.5"/><text x="100" y="70" font-size="20" text-anchor="middle" fill="#1a3a6e" font-weight="bold" size="12" text-anchor="middle" fill="#4aaa6a" font-weight="bold">+2</text></svg>`},{a:"(−4) + (−2) = −6",aL:"同號相加",bL:"數線圖",s:`<svg viewBox="0 0 200 155"><rect width="200" height="155" fill="#fff"/><line x1="10" y1="90" x2="190" y2="90" stroke="#333" stroke-width="3"/><g stroke="#333" stroke-width="2"><line x1="28" y1="82" x2="28" y2="98"/><text x="28" y="112" font-size="10" text-anchor="middle">-6</text><line x1="68" y1="82" x2="68" y2="98"/><text x="68" y="112" font-size="10" text-anchor="middle">-4</text><line x1="108" y1="82" x2="108" y2="98"/><text x="108" y="112" font-size="10" text-anchor="middle">-2</text><line x1="115" y1="78" x2="115" y2="102"/><text x="115" y="118" font-size="11" text-anchor="middle" font-weight="bold">0</text></g><line x1="115" y1="65" x2="68" y2="65" stroke="#e65555" stroke-width="3"/><polygon points="68,60 58,65 68,70" fill="#e65555"/><line x1="68" y1="50" x2="28" y2="50" stroke="#e65555" stroke-width="3"/><polygon points="28,45 18,50 28,55" fill="#e65555"/><text x="90" y="61" font-size="10" fill="#e65555">-4</text><text x="46" y="44" font-size="10" fill="#e65555">-2</text><circle cx="28" cy="90" r="8" fill="#4aaa6a"/><text x="28" y="83" font-size="12" text-anchor="middle" fill="#4aaa6a" font-weight="bold">-6</text></svg>`},{a:"(−5) × (+3) = −15",aL:"乘法",bL:"數線圖",s:`<svg viewBox="0 0 200 155"><rect width="200" height="155" fill="#fff"/><line x1="10" y1="90" x2="190" y2="90" stroke="#333" stroke-width="3"/><g stroke="#333" stroke-width="2"><line x1="22" y1="82" x2="22" y2="98"/><text x="22" y="112" font-size="10" text-anchor="middle">-15</text><line x1="62" y1="82" x2="62" y2="98"/><text x="62" y="112" font-size="10" text-anchor="middle">-9</text><line x1="102" y1="82" x2="102" y2="98"/><text x="102" y="112" font-size="10" text-anchor="middle">-3</text><line x1="115" y1="78" x2="115" y2="102"/><text x="115" y="118" font-size="11" text-anchor="middle" font-weight="bold">0</text></g><line x1="115" y1="65" x2="62" y2="65" stroke="#e65555" "><rect width="200" height="155" fill="#fff"/><rect x="28" y="38" width="144" height="80" fill="#f7fbff" stroke="#1a3a6e" stroke-width="2.5"/><text x="100" y="28" font-size="12" text-anchor="middle" fill="#1a3a6e">長方形</text><text x="100" y="55" font-size="13" text-anchor="middle" fill="#e65555" font-weight="bold">長 l</text><text x="16" y="80" font-size="13" text-anchor="middle" fill="#4aaa6a" font-weight="bold" transform="rotate(-90 16 80)">闊 w</text><line x1="28" y1="38" x2="28" y2="46" stroke="#e65555" stroke-width="2"/><line x1="28" y1="38" x2="36" y2="38" stroke="#e65555" stroke-width="2"/><line x1="160" y1="38" x2="160" y2="46" stroke="#4aaa6a" stroke-width="2"/><line x1="152" y1="38" x2="160" y2="38" stroke="#4aaa6a" stroke-width="2"/><text x="100" y="145" font-size="11" text-anchor="middle" fill="#888">P = 2×l + 2×w</text></svg>`},{a:"A = s²",aL:"正方形面積",bL:"圖解",s:`<svg viewBox="0 0 200 155"><rect width="200" height="155" fill="#fff"/><rect x="32" y="28" width="136" height="100" fill="#f7fbff" stroke="#1a3a6e" stroke-width="2.5"/><text x="100" y="20" font-size="12" text-anchor="middle" fill="#1a3a6e">正方形</text><text x="100" y="50" font-size="13" text-anchor="middle" fill="#e65555" font-weight="bold">邊長 s</text><text x="20" y="80" font-size="13" text-anchor="middle" fill="#e65555" font-weight="bold" transform="rotate(-90 20 80)">s</text><g stroke="#5a8fd4" stroke-width="1" stroke-dasharray="4,3"><line x1="32" y1="62" x2="168" y2="62"/><line x1="32" y1="96" x2="168" y2="96"/><line x1="100" y1="28" x2="100" y2="128"/><line x1="66" y1="28" x2="66" y2="128"/></g><text x="100" y="148" font-size="11" text-anchor="middle" fill="#888">A = s × s = s²</text></svg>`}]},ch4:{title:"Ch4 & Ch7 — 一元一次方程",desc:"x + 5 = 12 · 3(x−2) = 12",pairs:[{a:"x + 5 = 12",aL:"方程",bL:"數線圖",s:`<svg viewBox="0 0 200 155"><rect width="200" height="155" fill="#fff"/><line x1="15" y1="90" x2="185" y2="90" stroke="#333" stroke-width="3"/><g stroke="#333" stroke-width="2"><line x1="40" y1="82" x2="40" y2="98"/><text x="40" y="112" font-size="10" text-anchor="middle">0</text><line x1="90" y1="82" x2="90" y2="98"/><text x="90" y="112" font-size="10" text-anchor="middle">5</text><line x1="140" y1="82" x2="140" y2="98"/><text x="140" y="112" font-size="10" text-anchor="middle">10</text></g><line x1="55" y1="65" x2="90" y2="65" stroke="#5a8fd4" stroke-width="3"/><polygon points="90,60 100,65 90,70" fill="#5a8fd4"/><text x="72" y="60" font-size="11" fill="#5a8fd4">+5</text><text x="55" y="52" font-size="12" fill="#1a3a6e" font-weight="bold">x</text><circle cx="55" cy="90" r="7" fill="#e65555"/><text x="55" y="83" font-size="12" text-anchor="middle" fill="#e65555" font-weight="bold">x</text><circle cx="90" cy="90" r="7" fill="#4aaa6a"/><text x="90" y="83" font-size="12" text-anchor="middle" fill="#4aaa6a" font-weight="bold">12</text><text x="100" y="145" font-size="13" text-anchor="middle" fill="#1a3a6e" font-weight="bold">x = 7</text></svg>`},{a:"3(x − 2) = 12",aL:"方程（進階）",bL:"數線圖",s:`<svg viewBox="0 0 200 155"><rect width="200" height="155" fill="#fff"/><line x1="15" y1="90" x2="185" y2="90" stroke="#333" stroke-width="3"/><g stroke="#333" stroke-width="2"><line x1="40" y1="82" x2="40" y2="98"/><text x="40" y="112" font-size="10" text-anchor="middle">0</text><line x1="90" y1="82" x2="90" y2="98"/><text x="90" y="112" font-size="10" text-anchor="middle">2</text><line x1="140" y1="82" x2="140" y2="98"/><text x="140" y="112" font-size="10" text-anchor="middle">4</text><line x1="175" y1="82" x2="175" y2="98"/><text x="175" y="112" font-size="10" text-anchor="middle">6</text></g><line x1="90" y1="68" x2="140" y2="68" stroke="#5a8fd4" stroke-width="2.5"/><line x1="140" y1="53" x2="175" y2="53" stroke="#5a8fd4" stroke-width="2.5"/><polygon points="175,48 183,53 175,58" fill="#5a8fd4"/><text x="155" y="64" font-size="9" fill="#5a8fd4">×3,每組+2</text><circle cx="90" cy="90" r="7" fill="#e65555"/><text x="90" y="83" font-size="12" text-anchor="middle" fill="#e65555" font-weight="bold">x-2</text><circle cx="140" cy="90" r="7" fill="#4aaa6a"/><text x="140" y="83" font-size="12" text-anchor="middle" fill="#4aaa6a" font-weight="bold">12</text><text x="128" y="145" font-size="13" text-anchor="middle" fill="#1a3a6e" font-weight="bold">x = 6</text></svg>`}]}};

function showChapter(key){
  var d=D[key],m=document.getElementById('main');
  if(!d){m.innerHTML='<p style="color:#8b949e;text-align:center;padding:40px">此課題尚有預覽，請點下方連結查看完整卡牌</p>';return;}
  var html='<h2 class="chapter-title">'+d.title+'</h2><p class="chapter-desc">'+d.desc+'</p><div class="card-grid">';
  d.pairs.forEach(function(p){
    html+='<div class="pair"><div class="pair-header">配對卡牌</div><div class="pair-body"><div class="card-algebra"><div class="card-label">📐 代數</div><div class="card-text">'+p.a+'</div></div><div class="card-graph"><div class="card-label">🖼️ 圖像</div>'+p.s+'</div></div></div>';
  });
  html+='</div><a class="open-link" href="'+key+'.html">開啟完整卡牌頁面（可列印） →</a>';
  m.innerHTML=html;
}
showChapter('ch1');
