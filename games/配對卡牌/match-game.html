<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🃏 代數↔圖像 配對遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;min-height:100vh}
.header{background:rgba(0,0,0,.3);padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:2px solid rgba(255,255,255,.1)}
.header h1{font-size:1.1rem;color:#ffd700;flex:1}
.back-link{display:inline-block;padding:6px 14px;background:rgba(255,255,255,.1);color:#aaa;border-radius:8px;text-decoration:none;font-size:.85rem}
.back-link:hover{background:rgba(255,255,255,.2);color:#fff}
/* Setup */
.setup{padding:20px;max-width:900px;margin:0 auto}
.intro{color:#aaa;font-size:.9rem;line-height:1.6;margin-bottom:20px}
.intro strong{color:#ffd700}
.load-status{margin-bottom:16px;padding:8px 14px;background:rgba(255,255,255,.06);border-radius:8px;font-size:.82rem;color:#aaa}
.load-status.ok{color:#4aaa6a}
.chapter-group{margin-bottom:18px}
.group-title{font-size:.82rem;color:#ffd700;font-weight:700;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,215,0,.3)}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}
.ch-btn{display:flex;flex-direction:column;padding:11px 13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:11px;color:#fff;cursor:pointer;transition:all .2s;font-size:.82rem}
.ch-btn:hover{background:rgba(255,215,0,.14);border-color:#ffd700;transform:translateY(-2px)}
.ch-btn .ch-num{font-size:.65rem;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.ch-btn .ch-name{font-weight:700;font-size:.88rem}
.ch-btn .ch-meta{font-size:.7rem;color:#aaa;margin-top:2px}
.ch-selected{border-color:#ffd700!important;background:rgba(255,215,0,.2)!important}
/* Stats */
.stats-bar{display:flex;justify-content:space-around;background:rgba(255,255,255,.1);border-radius:12px;padding:10px 0;margin:0 20px 14px}
.stat{text-align:center}
.stat .num{font-size:1.6rem;font-weight:900;color:#ffd700}
.stat .lbl{font-size:.62rem;color:#aaa;letter-spacing:1.5px;text-transform:uppercase}
/* Game */
.game-area{padding:0 20px 30px;max-width:900px;margin:0 auto;display:none}
.ch-banner{text-align:center;padding:10px 20px 0;font-size:.88rem;color:#ffd700;font-weight:700;letter-spacing:1px}
.back-btn{display:block;text-align:center;padding:10px;color:#aaa;font-size:.82rem;cursor:pointer}
.back-btn:hover{color:#fff}
.board{display:grid;gap:8px;margin-bottom:14px}
.board-4{grid-template-columns:repeat(4,1fr)}
.board-5{grid-template-columns:repeat(5,1fr)}
.board-3{grid-template-columns:repeat(3,1fr)}
.board-6{grid-template-columns:repeat(4,1fr)}
.card{aspect-ratio:1;background:linear-gradient(135deg,#2d3a5a,#1a2a4a);border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .25s,box-shadow .25s;padding:5px;min-height:85px;position:relative;overflow:hidden;border:2px solid transparent}
.card:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.card.hidden-card{background:linear-gradient(135deg,#2d3a5a,#1a2a4a)}
.card.hidden-card::after{content:'?';font-size:2rem;color:rgba(255,255,255,.2);font-weight:900}
.card.revealed{background:linear-gradient(135deg,#e8f0fe,#d0e4ff);border-color:#5a8fd4;transform:scale(0.95)}
.card.revealed.green{background:linear-gradient(135deg,#f0faf4,#d8f5e8);border-color:#4aaa6a}
.card.matched{opacity:.4;pointer-events:none;background:linear-gradient(135deg,#1e4d2b,#0f2a1f);border-color:#4aaa6a}
.card.wrong{animation:shake .3s}
.card-label{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;opacity:.5;color:#888;display:none}
.card.revealed .card-label,.card.matched .card-label{display:block}
.card.revealed .card-label{color:#5a8fd4}
.card.revealed.green .card-label{color:#4aaa6a}
/* Algebra cards: big centered text, SVG hidden */
.card-text{font-size:.7rem;font-weight:700;color:#1a3a6e;text-align:center;line-height:1.3;word-break:break-word;padding:4px 6px;display:none}
.card.revealed .card-text,.card.matched .card-text{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:clamp(1rem,5vw,2rem);font-weight:900;padding:10px}
.card.revealed.green .card-text{color:#2d7a4a;font-size:.7rem;font-weight:700}
/* Graph cards: SVG fills card, centered */
.card-svg-wrap{width:100%;height:100%;display:none;overflow:hidden;padding:0}
.card.revealed:not(.green) .card-svg-wrap,.card.matched:not(.green) .card-svg-wrap{display:none!important}
.card.revealed.green .card-svg-wrap,.card.revealed.green .card-text,.card.matched.green .card-svg-wrap,.card.matched.green .card-text{display:flex;align-items:center;justify-content:center}
.card.revealed.green .card-svg-wrap svg{max-width:95%;max-height:95%;width:auto;height:auto}
.card.matched.green .card-text{font-size:.75rem}
/* Mobile: bigger everything */
@media(max-width:600px){
  .card-text{font-size:clamp(1rem,7vw,1.8rem)!important}
  .card.revealed.green .card-text{font-size:.8rem!important}
  .card-label{font-size:.7rem!important}
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
/* Results */
.results{text-align:center;padding:40px 20px;display:none}
.results h2{font-size:2rem;margin-bottom:8px}
.big{font-size:3.5rem;font-weight:900;color:#ffd700;margin:10px 0}
.eff-tag{display:inline-block;padding:4px 14px;background:rgba(255,215,0,.2);border:1px solid #ffd700;border-radius:20px;font-size:.85rem;margin-top:10px}
.btn-row{margin-top:20px}
.btn{display:inline-block;padding:11px 28px;border-radius:25px;border:none;font-size:.95rem;font-weight:700;cursor:pointer;color:#fff}
.btn-primary{background:linear-gradient(135deg,#ffd700,#ff9500);color:#1a1a2e}
.btn-secondary{background:rgba(255,255,255,.14)}
@media(max-width:500px){
  .board-4,.board-5,.board-6{grid-template-columns:repeat(3,1fr)}
  .ch-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="header">
  <h1>🃏 代數 ↔ 圖像 配對遊戲</h1>
  <a href="viewer.html" class="back-link">← 課題瀏覽器</a>
</div>

<!-- Setup -->
<div class="setup" id="setupScreen">
  <p class="intro">揀選課題，將 <strong>藍色代數卡</strong> 與 <strong>綠色圖像卡</strong> 配對！</p>
  <div class="load-status" id="loadStatus">⏳ 正在載入卡牌數據...</div>

  <div id="chapterButtons"></div>
</div>

<!-- Game -->
<div class="game-area" id="gameArea">
  <div class="back-btn" onclick="backToSetup()">← 返回課題選擇</div>
  <div class="ch-banner" id="chBanner"></div>
  <div class="stats-bar">
    <div class="stat"><span class="num" id="pairsLeft">0</span><span class="lbl">剩餘</span></div>
    <div class="stat"><span class="num" id="moves">0</span><span class="lbl">翻牌</span></div>
    <div class="stat"><span class="num" id="timer">0</span><span class="lbl">秒</span></div>
  </div>
  <div class="board" id="board"></div>
</div>

<!-- Results -->
<div class="results" id="resultsScreen">
  <h2>🎉 全部配對完成！</h2>
  <div class="big" id="finalTime">0</div>
  <p style="color:#aaa">完成時間（秒）</p>
  <p style="margin-top:16px">翻牌次數：<strong id="finalMoves" style="color:#ffd700;font-size:1.2rem">0</strong></p>
  <div class="eff-tag" id="effTag"></div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="replayChapter()">🔄 再玩本章</button>
    <button class="btn btn-secondary" onclick="backToSetup()">揀其他課題</button>
  </div>
</div>

<script>
// ============================================================
// Chapter definitions — each chapter's HTML file and title
// ============================================================
// PNG files for chapter thumbnails
var CHAPTER_PNG_FILES = {
  ch1: 'png/ch1-基礎計算.png',
  ch2: 'png/ch2-有向數.png',
  ch3: 'png/ch3-代數式.png',
  ch4: 'png/ch4-一元一次方程.png',
  ch5: 'png/ch5-面積與體積.png',
  ch6: 'png/ch6-多項式.png',
  ch8: 'png/ch8-統計（一）.png',
  ch9: 'png/ch9-百分法.png',
  ch11: 'png/ch11-平行線與角.png',
  ch12: 'png/ch12-全等三角形.png',
  ch13: 'png/ch13-數值估算.png',
  ch14: 'png/ch14-率、比及比例.png',
};

var CHAPTERS = {
 ch1:{title:"Ch1 — 基礎計算",file:"ch1-factor.html",pairs:4},
 ch2:{title:"Ch2 — 有向數",file:"ch2-directed.html",pairs:4},
 ch3:{title:"Ch3 — 代數式",file:"ch3-algebra.html",pairs:2},
 ch4:{title:"Ch4 & Ch7 — 一元一次方程",file:"ch4-lin1.html",pairs:2},
 ch5:{title:"Ch5 — 面積與體積",file:"ch5-area.html",pairs:3},
 ch6:{title:"Ch6 — 多項式",file:"ch6-polynomial.html",pairs:4},
 ch8:{title:"Ch8 — 統計（一）",file:"ch8-statistics.html",pairs:4},
 ch9:{title:"Ch9 — 百分法（一）",file:"ch9-percent.html",pairs:4},
 ch11:{title:"Ch11 — 平行線與角",file:"ch11-angles.html",pairs:5},
 ch12:{title:"Ch12 — 全等三角形 ⭐",file:"ch12-congruent.html",pairs:5},
 ch13:{title:"Ch13 — 數值估算",file:"ch13-sigfig.html",pairs:2},
 ch14:{title:"Ch14 — 率、比及比例",file:"ch14-ratio.html",pairs:3}
};

var loadedCards = {};  // ch -> [{a, aL, s}]
var selectedChapter = null;
var cards = [];
var flipped = [];
var matched = 0;
var totalPairs = 0;
var moveCount = 0;
var timerVal = 0;
var timerInt = null;

// ============================================================
// Load all chapter HTML files and extract card data
// ============================================================
async function loadAllChapters() {
  var status = document.getElementById('loadStatus');
  var keys = Object.keys(CHAPTERS);
  var loaded = 0;

  await Promise.all(keys.map(async function(ch) {
    try {
      var resp = await fetch(CHAPTERS[ch].file);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var text = await resp.text();
      var parser = new DOMParser();
      var doc = parser.parseFromString(text, 'text/html');
      var rows = doc.querySelectorAll('.card-row');
      var pairs = [];
      rows.forEach(function(row) {
        var algebraEl = row.querySelector('.algebra-card .card-content');
        var algebraLabel = row.querySelector('.algebra-card .card-label');
        var graphEl = row.querySelector('.graph-card .card-graph');
        if (algebraEl && graphEl) {
          var svgEl = graphEl.querySelector('svg');
          pairs.push({
            a: algebraEl.textContent.trim(),
            aL: algebraLabel ? algebraLabel.textContent.trim() : '代數',
            s: svgEl ? svgEl.outerHTML : ''
          });
        }
      });
      loadedCards[ch] = pairs;
      loaded++;
      status.textContent = '✅ 已載入 ' + loaded + ' / ' + keys.length + ' 個課題';
    } catch(e) {
      console.warn('Failed to load', ch, e);
      loadedCards[ch] = [];
      loaded++;
    }
  }));

  if (loaded === keys.length) {
    status.textContent = '✅ 全部 ' + keys.length + ' 個課題載入完成！';
    status.className = 'load-status ok';
    renderChapterButtons();
  }
}

// ============================================================
// Render chapter selection buttons
// ============================================================
function renderChapterButtons() {
  var container = document.getElementById('chapterButtons');
  var html = '';

  var groups = [
    {label:'上學期 — Ch1 至 Ch5', keys:['ch1','ch2','ch3','ch4','ch5']},
    {label:'下學期前半 — Ch6 至 Ch10', keys:['ch6','ch8','ch9']},
    {label:'下學期後半 — Ch11 至 Ch14', keys:['ch11','ch12','ch13','ch14']}
  ];

  groups.forEach(function(g) {
    html += '<div class="chapter-group">';
    html += '<div class="group-title">'+g.label+'</div>';
    html += '<div class="ch-grid">';
    g.keys.forEach(function(ch) {
      var info = CHAPTERS[ch];
      var count = loadedCards[ch] ? loadedCards[ch].length : 0;
      html += '<div class="ch-btn" id="btn-'+ch+'" onclick="selectChapter(\''+ch+'\',this)">';
      html += '<span class="ch-num">'+info.title.split('—')[0].trim()+'</span>';
      html += '<span class="ch-name">'+info.title.split('—')[1].trim()+'</span>';
      html += '<span class="ch-meta">'+count+' 對卡牌</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  // Inject PNG thumbnails as background images on chapter buttons
(function() {
  Object.keys(CHAPTER_PNG_FILES).forEach(function(ch) {
    var btn = document.getElementById('btn-' + ch);
    if (btn && CHAPTER_PNG_FILES[ch]) {
      btn.style.backgroundImage = 'url(' + CHAPTER_PNG_FILES[ch] + ')';
      btn.style.backgroundSize = '100% auto';
      btn.style.backgroundPosition = 'top center';
      btn.style.backgroundRepeat = 'no-repeat';
      btn.style.minHeight = '95px';
      btn.style.paddingTop = '75px';
    }
  });
})();

container.innerHTML = html;
}

// ============================================================
// Game logic
// ============================================================
function selectChapter(ch, btnEl) {
  selectedChapter = ch;
  var pairs = loadedCards[ch];
  if (!pairs || pairs.length === 0) {
    alert('此課題暫無卡牌數據，請稍後再試。');
    return;
  }
  // Deselect all
  document.querySelectorAll('.ch-btn').forEach(function(b){b.classList.remove('ch-selected')});
  if (btnEl) btnEl.classList.add('ch-selected');

  // Build cards: each pair = algebra card + graph card
  totalPairs = Math.min(pairs.length, CHAPTERS[ch].pairs);
  cards = [];
  for (var i = 0; i < totalPairs; i++) {
    cards.push({id:i*2, pairId:i, type:'algebra', text:pairs[i].a, label:pairs[i].aL, svg:pairs[i].s});
    cards.push({id:i*2+1, pairId:i, type:'graph', text:'', label:'圖像', svg:pairs[i].s});
  }
  shuffle(cards);

  matched = 0; moveCount = 0; timerVal = 0; flipped = [];

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('chBanner').textContent = CHAPTERS[ch].title;

  renderBoard();
  updateStats();
  if (timerInt) clearInterval(timerInt);
  timerInt = setInterval(function(){
    timerVal++;
    document.getElementById('timer').textContent = timerVal;
  }, 1000);
}

function shuffle(arr) {
  for (var i=arr.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function renderBoard() {
  var board = document.getElementById('board');
  board.innerHTML = '';
  // Set grid columns based on pair count
  board.className = 'board';
  if (totalPairs <= 3) board.classList.add('board-3');
  else if (totalPairs === 4) board.classList.add('board-4');
  else if (totalPairs === 5) board.classList.add('board-5');
  else board.classList.add('board-6');

  cards.forEach(function(c) {
    var el = document.createElement('div');
    el.className = 'card hidden-card';
    el.dataset.id = c.id;
    el.innerHTML = '<div class="card-label">代數</div><div class="card-text"></div><div class="card-svg-wrap"></div>';
    el.addEventListener('click', function() { flipCard(c.id, el); });
    el.addEventListener('touchend', function(e) { e.preventDefault(); flipCard(c.id, el); });
    board.appendChild(el);
  });
}

function flipCard(id, el) {
  if (flipped.length >= 2) return;
  if (el.classList.contains('matched') || el.classList.contains('revealed')) return;

  var card = cards.find(function(c){return c.id===id;});
  el.classList.remove('hidden-card');
  el.classList.add('revealed');
  if (card.type === 'graph') el.classList.add('green');

  // Fill content
  el.querySelector('.card-label').textContent = card.type === 'algebra' ? '代數' : '圖像';
  el.querySelector('.card-text').textContent = card.text;
  var svgWrap = el.querySelector('.card-svg-wrap');
  if (svgWrap && card.svg) svgWrap.innerHTML = card.svg;

  flipped.push({id:id, pairId:card.pairId, el:el});

  if (flipped.length === 2) {
    moveCount++;
    document.getElementById('moves').textContent = moveCount;

    if (flipped[0].pairId === flipped[1].pairId) {
      // Match!
      flipped.forEach(function(f){ f.el.classList.add('matched'); });
      matched++;
      document.getElementById('pairsLeft').textContent = totalPairs - matched;
      flipped = [];
      if (matched === totalPairs) endGame();
    } else {
      // Wrong
      flipped.forEach(function(f){ f.el.classList.add('wrong'); });
      setTimeout(function() {
        flipped.forEach(function(f){
          f.el.classList.remove('revealed','wrong','green');
          f.el.classList.add('hidden-card');
          f.el.querySelector('.card-text').textContent = '';
          f.el.querySelector('.card-svg-wrap').innerHTML = '';
        });
        flipped = [];
      }, 900);
    }
  }
}

function updateStats() {
  document.getElementById('pairsLeft').textContent = totalPairs - matched;
  document.getElementById('moves').textContent = moveCount;
  document.getElementById('timer').textContent = timerVal;
}

function endGame() {
  clearInterval(timerInt);
  var eff = Math.round((totalPairs / moveCount) * 100);
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';
  document.getElementById('finalTime').textContent = timerVal;
  document.getElementById('finalMoves').textContent = moveCount;
  document.getElementById('effTag').textContent = '效率 ' + eff + '%';
}

function replayChapter() {
  document.getElementById('resultsScreen').style.display = 'none';
  var btn = document.getElementById('btn-'+selectedChapter);
  selectChapter(selectedChapter, btn);
}

function backToSetup() {
  clearInterval(timerInt);
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
  document.querySelectorAll('.ch-btn').forEach(function(b){b.classList.remove('ch-selected')});
}

// Start loading
loadAllChapters();
</script>
</body>
</html>
