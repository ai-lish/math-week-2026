<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🃏 公式圖像配對 - Formula Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--card:#16213e;--accent:#e94560;
  --gold:#f5c518;--teal:#0f3460;--text:#eaeaea;
  --easy:#2ecc71;--med:#f39c12;--hard:#e74c3c;
  --area:#3b82f6;--peri:#f59e0b;--vol:#10b981;--algebra:#8b5cf6;
}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:16px;color:var(--text);
}
.container{
  background:var(--card);
  border-radius:16px;
  width:100%;max-width:560px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  overflow:hidden;
}
.header{
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;text-align:center;
}
.header h1{font-size:1.6rem;font-weight:900;color:#fff}
.header p{color:rgba(255,255,255,.8);font-size:.85rem;margin-top:4px}
/* Setup */
.setup{padding:24px;text-align:center;display:block}
.setup h2{font-size:1.1rem;margin-bottom:16px;color:var(--gold)}
.opt-group{margin-bottom:18px}
.opt-label{font-size:.8rem;color:rgba(255,255,255,.6);margin-bottom:8px}
.opt-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.opt-btn{
  padding:10px 16px;border:none;border-radius:10px;
  font-weight:700;font-size:.9rem;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  font-family:inherit;
  background:rgba(255,255,255,.1);color:#fff;
}
.opt-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.opt-btn.easy{background:var(--easy)}
.opt-btn.med{background:var(--med)}
.opt-btn.hard{background:var(--hard)}
.opt-btn.all{background:var(--teal)}
.opt-btn.selected{outline:3px solid var(--gold);outline-offset:2px}
.opt-btn:disabled{cursor:not-allowed;opacity:.4}
.opt-btn:disabled:hover{transform:none;box-shadow:none}
.start-btn{
  background:var(--accent);color:#fff;
  border:none;padding:14px 32px;border-radius:10px;
  font-size:1.1rem;font-weight:700;cursor:pointer;
  font-family:inherit;transition:transform .15s;
  display:block;margin:0 auto;
}
.start-btn:hover{transform:translateY(-2px)}
/* Game area */
.game-area{padding:20px;display:none}
.level-badge{
  display:inline-block;padding:4px 16px;border-radius:20px;
  font-size:.8rem;font-weight:700;margin-bottom:12px;
  background:rgba(255,255,255,.15);
}
.timer-bar{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.05);
  padding:10px 14px;border-radius:10px;
  margin-bottom:12px;
}
.timer-label{font-weight:700;color:var(--gold);white-space:nowrap;font-size:.9rem}
.timer-track{flex:1;height:8px;background:#333;border-radius:4px;overflow:hidden}
.timer-fill{height:100%;background:var(--accent);transition:width 1s linear;border-radius:4px}
.timer-text{font-weight:900;font-size:1.1rem;min-width:40px;text-align:right;color:var(--gold)}
.timer-warning .timer-fill{background:var(--hard);animation:pulse .5s infinite}
.timer-warning .timer-text{color:var(--hard)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.score-board{
  display:flex;justify-content:space-between;
  background:rgba(255,255,255,.05);
  padding:10px 14px;border-radius:10px;
  margin-bottom:12px;font-size:.9rem;
}
.score-pos{color:var(--easy);font-weight:700}
.score-neg{color:var(--hard);font-weight:700}
/* Card grid */
.board{display:grid;gap:8px}
.board.cols-2{grid-template-columns:repeat(2,1fr)}
.board.cols-3{grid-template-columns:repeat(3,1fr)}
.board.cols-4{grid-template-columns:repeat(4,1fr)}
.board.cols-5{grid-template-columns:repeat(5,1fr)}
/* Formula card (SVG card) */
.card{
  background:linear-gradient(145deg,#1e2a4a,#162035);
  border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all .3s;
  user-select:none;-webkit-user-select:none;
  position:relative;overflow:hidden;
  min-height:100px;
  padding:8px;
}
.card-cover{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#2a3a6e,#1a2a5e);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;color:rgba(255,255,255,.2);
  transition:opacity .3s;
  z-index:2;
}
.card.revealed .card-cover{opacity:0;pointer-events:none}
.card.matched{opacity:.55;pointer-events:none}
.card.matched .card-cover{opacity:0}
.card.wrong{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
/* SVG inside card */
.card-svg-wrap{
  width:100%;flex:1;display:flex;align-items:center;justify-content:center;
  padding:4px 0;
}
.card-svg-wrap svg{
  width:100%;height:100%;max-height:55px;
}
.card-label{
  font-size:.65rem;font-weight:700;color:#fff;text-align:center;
  padding:2px 4px 4px;line-height:1.3;
  width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.card-label.formula-type{color:rgba(255,255,255,.85)}
.card-label.answer-type{color:var(--gold);font-size:.6rem}
/* Badge on card */
.cat-badge{
  position:absolute;top:4px;right:4px;
  font-size:.5rem;padding:1px 5px;border-radius:8px;
  font-weight:700;opacity:.7;
  background:rgba(255,255,255,.1);color:#fff;
}
/* Level up overlay */
.levelup-overlay{
  position:absolute;inset:0;z-index:20;
  background:rgba(0,0,0,.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:16px;
}
.levelup-icon{font-size:4rem;animation:bounce .5s}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.levelup-text{font-size:1.4rem;font-weight:900;color:var(--gold);margin-top:8px}
/* Results */
.results{padding:24px;text-align:center;display:none}
.results h2{font-size:1.4rem;margin-bottom:16px}
.results h2.win{color:var(--gold)}
.results h2.timeout{color:var(--hard)}
.big{font-size:3rem;font-weight:900;color:#fff}
.stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.stat{text-align:center}
.stat-n{font-size:1.6rem;font-weight:900}
.stat-l{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px}
.play-again{
  background:var(--accent);color:#fff;
  border:none;padding:14px 32px;border-radius:10px;
  font-size:1.1rem;font-weight:700;cursor:pointer;
  font-family:inherit;transition:transform .15s;
}
.play-again:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="container" id="app" style="position:relative;overflow:hidden">
  <div class="header">
    <h1>🃏 公式圖像配對</h1>
    <p>配對公式和它的答案！</p>
  </div>

  <div class="setup" id="setup">
    <h2>⚙️ 遊戲設定</h2>
    <div class="opt-group">
      <div class="opt-label">🏫 年級</div>
      <div class="opt-row" id="gradeRow">
        <button class="opt-btn easy" onclick="selectGrade('S1',this)">中一</button>
        <button class="opt-btn easy" onclick="selectGrade('S2',this)">中二</button>
        <button class="opt-btn med" onclick="selectGrade('S3',this)">中三</button>
        <button class="opt-btn hard" onclick="selectGrade('S4',this)">中四</button>
        <button class="opt-btn hard" onclick="selectGrade('S5',this)">中五</button>
        <button class="opt-btn hard" onclick="selectGrade('S6',this)">中六</button>
      </div>
    </div>
    <div class="opt-group">
      <div class="opt-label">📂 類別</div>
      <div class="opt-row" id="catRow">
        <button class="opt-btn selected" onclick="selectCat('代數',this)">代數</button>
        <button class="opt-btn" onclick="selectCat('幾何',this)">幾何</button>
        <button class="opt-btn" onclick="selectCat('統計',this)">統計</button>
        <button class="opt-btn" disabled title="暫未開放">其他 🔒</button>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">🚀 開始配對</button>
    <p id="loadStatus" style="color:#aaa;font-size:.8rem;margin-top:12px;"></p>
  </div>

  <div class="game-area" id="gameArea">
    <div style="text-align:center;margin-bottom:10px">
      <span class="level-badge" id="levelBadge">第 1 關</span>
    </div>
    <div class="timer-bar" id="timerBar">
      <span class="timer-label">⏱️</span>
      <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
      <span class="timer-text" id="timerText">20</span>
    </div>
    <div class="score-board">
      <span>✅ 剩餘 <span class="score-pos" id="pairsLeft">2</span></span>
      <span>🔄 <span id="moves">0</span> 次</span>
    </div>
    <div class="board cols-2" id="board"></div>
  </div>

  <div class="results" id="results">
    <h2 id="resultTitle" class="win">🎉 過關！</h2>
    <div class="big" id="finalTime">0</div>
    <div style="color:rgba(255,255,255,.6);font-size:.9rem;margin-bottom:16px">完成關數</div>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-n" id="finalLevel">1</div>
        <div class="stat-l">通過關數</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="finalMoves">0</div>
        <div class="stat-l">總翻牌次</div>
      </div>
    </div>
    <button class="play-again" onclick="resetGame()">🔄 再玩一次</button>
  </div>
</div>

<script>
// Fallback pairs (should rarely be needed)
const FALLBACK_PAIRS = [
    {formula:'長方形',answer:'長 × 寬',category:'幾何',grade:'S1',svg:null},
    {formula:'三角形',answer:'½ × 底 × 高',category:'幾何',grade:'S1',svg:null},
    {formula:'圓形',answer:'π × 半徑²',category:'幾何',grade:'S1',svg:null},
    {formula:'梯形',answer:'½(上底+下底)×高',category:'幾何',grade:'S2',svg:null},
    {formula:'a² − b²',answer:'(a+b)(a−b)',category:'代數',grade:'S3',svg:null},
    {formula:'(a+b)²',answer:'a²+2ab+b²',category:'代數',grade:'S3',svg:null},
    {formula:'平均數',answer:'總和 ÷ 數量',category:'統計',grade:'S2',svg:null},
    {formula:'中位數',answer:'排序後的中間值',category:'統計',grade:'S2',svg:null},
];

let ALL_PAIRS = [];
let selectedGrade = null;
let selectedCat = '代數';

const LEVELS = [[2,20],[3,30],[4,40]];
const MAX_LEVEL = LEVELS.length;

let currentLevel = 0;
let currentPairs = [];
let cards = [];
let flipped = [];
let matched = 0;
let moveCount = 0;
let timerVal = 0;
let timerInt = null;
let totalMoves = 0;

async function loadPairs() {
    const status = document.getElementById('loadStatus');
    try {
        const resp = await fetch('../question-bank/formula_pairs.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        ALL_PAIRS = data.pairs || data;
        const withSvg = ALL_PAIRS.filter(p => p.svg).length;
        status.textContent = '✅ 已載入 ' + ALL_PAIRS.length + ' 條題目（含 ' + withSvg + ' 張卡牌圖）';
    } catch(e) {
        ALL_PAIRS = FALLBACK_PAIRS.map((p,i) => ({...p,id:i}));
        status.textContent = '⚠️ 使用內置題庫';
    }
}
loadPairs();

function selectGrade(val, btn) {
    if (selectedGrade === val) {
        selectedGrade = null;
        document.querySelectorAll('#gradeRow .opt-btn').forEach(b => b.classList.remove('selected'));
        return;
    }
    selectedGrade = val;
    document.querySelectorAll('#gradeRow .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function selectCat(val, btn) {
    selectedCat = val;
    document.querySelectorAll('#catRow .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getPool() {
    let pool = ALL_PAIRS.filter(p => p.category === selectedCat);
    if (selectedGrade) pool = pool.filter(p => p.grade === selectedGrade);
    return pool;
}

function startGame() {
    const pool = getPool();
    if (pool.length < 2) {
        alert('此分類題目不足，請選擇其他設定。');
        return;
    }
    currentLevel = 0;
    totalMoves = 0;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    startLevel(pool);
}

function startLevel(pool) {
    const [pairs, secs] = LEVELS[currentLevel];
    if (pool.length < pairs) {
        endGame(true);
        return;
    }

    currentPairs = shuffle([...pool]).slice(0, pairs);
    matched = 0; moveCount = 0; timerVal = 0; flipped = [];

    document.getElementById('levelBadge').textContent = '第 ' + (currentLevel + 1) + ' 關';
    document.getElementById('pairsLeft').textContent = pairs;
    document.getElementById('moves').textContent = '0';

    const timerText = document.getElementById('timerText');
    const timerBar = document.getElementById('timerBar');
    timerText.textContent = secs;
    timerBar.classList.remove('timer-warning');

    const board = document.getElementById('board');
    board.className = 'board';
    if (pairs === 2) board.classList.add('cols-2');
    else if (pairs === 3) board.classList.add('cols-3');
    else board.classList.add('cols-4');

    renderBoard();
    startTimer(secs);
}

function startTimer(secs) {
    clearInterval(timerInt);
    timerVal = 0;
    const timerFill = document.getElementById('timerFill');
    const timerText = document.getElementById('timerText');
    const timerBar = document.getElementById('timerBar');
    timerFill.style.width = '100%';

    timerInt = setInterval(() => {
        timerVal++;
        timerText.textContent = secs - timerVal;
        timerFill.style.width = Math.max(0, (secs - timerVal) / secs * 100) + '%';
        if (timerVal >= secs - 5) timerBar.classList.add('timer-warning');
        if (timerVal >= secs) {
            clearInterval(timerInt);
            endGame(false);
        }
    }, 1000);
}

function makeSvgCard(svgRaw, text, type) {
    // Wrap SVG: ensure viewBox, strip width/height, add preserveAspectRatio
    let svgContent = svgRaw || '';
    // Inject viewBox if missing
    if (!/viewBox=/i.test(svgContent)) {
        svgContent = svgContent.replace('<svg', '<svg viewBox="0 0 110 110"');
    }
    // Ensure preserveAspectRatio
    if (!/preserveAspectRatio=/i.test(svgContent)) {
        svgContent = svgContent.replace('<svg', '<svg preserveAspectRatio="xMidYMid meet"');
    }
    // Strip existing width/height from svg tag
    svgContent = svgContent.replace(/\s(width|height)="[^"]*"/g, '');

    const labelClass = type === 'formula' ? 'formula-type' : 'answer-type';
    return `
<div class="card-svg-wrap">${svgContent}</div>
<div class="card-label ${labelClass}">${escapeHtml(text)}</div>`;
}

function escapeHtml(s) {
    return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

function renderBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    cards = [];

    currentPairs.forEach((p, i) => {
        // Formula card
        const formulaCard = makeCardEl(i * 2, i, p.formula, 'formula', p.svg);
        // Answer card
        const answerCard = makeCardEl(i * 2 + 1, i, p.answer, 'answer', p.svg);
        cards.push({ id: i * 2, pairId: i, el: formulaCard });
        cards.push({ id: i * 2 + 1, pairId: i, el: answerCard });
        board.appendChild(formulaCard);
        board.appendChild(answerCard);
    });
    shuffle(cards);
    // Re-append in shuffled order
    board.innerHTML = '';
    cards.forEach(c => board.appendChild(c.el));
}

function makeCardEl(id, pairId, text, type, svgRaw) {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = id;
    div.dataset.pairId = pairId;

    // Cover layer
    const cover = document.createElement('div');
    cover.className = 'card-cover';
    cover.textContent = '?';
    div.appendChild(cover);

    // SVG + label content
    const svgContent = makeSvgCard(svgRaw, text, type);
    // Parse and append
    const temp = document.createElement('div');
    temp.innerHTML = svgContent;
    while (temp.firstChild) div.appendChild(temp.firstChild);

    div.addEventListener('click', () => flipCard(id, div));
    div.addEventListener('touchend', e => { e.preventDefault(); div.click(); });

    return div;
}

function flipCard(id, div) {
    // Find card data
    const card = cards.find(c => c.id === id);
    if (!card) return;
    if (div.classList.contains('matched') || div.classList.contains('revealed')) return;
    if (flipped.length >= 2) return;

    div.classList.add('revealed');
    flipped.push({ id, el: div, pairId: card.pairId });

    if (flipped.length === 2) {
        moveCount++;
        totalMoves++;
        document.getElementById('moves').textContent = moveCount;

        if (flipped[0].pairId === flipped[1].pairId) {
            flipped.forEach(f => {
                f.el.classList.remove('revealed');
                f.el.classList.add('matched');
            });
            matched++;
            document.getElementById('pairsLeft').textContent = currentPairs.length - matched;
            flipped = [];
            if (matched === currentPairs.length) {
                clearInterval(timerInt);
                if (currentLevel + 1 >= MAX_LEVEL) {
                    endGame(true);
                } else {
                    showLevelUp();
                }
            }
        } else {
            flipped.forEach(f => f.el.classList.add('wrong'));
            setTimeout(() => {
                flipped.forEach(f => {
                    f.el.classList.remove('revealed', 'wrong');
                });
                flipped = [];
            }, 800);
        }
    }
}

function showLevelUp() {
    const container = document.getElementById('app');
    const overlay = document.createElement('div');
    overlay.className = 'levelup-overlay';
    overlay.innerHTML = `
        <div class="levelup-icon">🎉</div>
        <div class="levelup-text">第 ${currentLevel + 1} 關完成！</div>`;
    container.appendChild(overlay);
    setTimeout(() => {
        overlay.remove();
        currentLevel++;
        startLevel(getPool());
    }, 1800);
}

function endGame(won) {
    clearInterval(timerInt);
    document.getElementById('gameArea').style.display = 'none';
    const results = document.getElementById('results');
    results.style.display = 'block';
    const title = document.getElementById('resultTitle');
    if (won) {
        title.textContent = '🎉 全部過關！';
        title.className = 'win';
    } else {
        title.textContent = '⏱️ 時間到！';
        title.className = 'timeout';
    }
    document.getElementById('finalTime').textContent = currentLevel + (won ? 1 : 0);
    document.getElementById('finalLevel').textContent = currentLevel + (won ? 1 : 0);
    document.getElementById('finalMoves').textContent = totalMoves;
}

function resetGame() {
    clearInterval(timerInt);
    document.getElementById('results').style.display = 'none';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('setup').style.display = 'block';
}
</script>
</body>
</html>
