<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🃏 公式圖像配對 - Formula Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Noto Sans TC',sans-serif; background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); color:#fff; min-height:100vh; -webkit-tap-highlight-color:transparent; }
        .container { max-width:600px; margin:0 auto; padding:15px; }
        .back-link { display:inline-block; color:#aaa; text-decoration:none; padding:10px 0; font-size:0.9rem; }
        h1 { text-align:center; font-size:1.6rem; margin:5px 0; }
        .subtitle { text-align:center; color:#aaa; margin-bottom:15px; font-size:0.85rem; }

        .stats-bar { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.1); border-radius:12px; padding:10px 20px; margin:10px 0; }
        .stats-bar .stat { text-align:center; }
        .stats-bar .num { font-size:1.5rem; font-weight:900; }
        .stats-bar .lbl { font-size:0.7rem; color:#aaa; }

        .board { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:15px 0; }
        .card { aspect-ratio:1; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:bold; cursor:pointer; transition:all 0.3s; padding:6px; text-align:center; word-break:break-word; user-select:none; -webkit-user-select:none; min-height:80px; }
        .card.hidden-card::after { content:'❓'; font-size:1.8rem; }
        .card.revealed { background:rgba(255,255,255,0.15); transform:scale(0.95); }
        .card.matched { background:linear-gradient(135deg,#2ecc71,#27ae60); opacity:0.6; pointer-events:none; }
        .card.wrong { background:linear-gradient(135deg,#e74c3c,#c0392b); animation:shake 0.3s; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

        .btn { display:inline-block; padding:12px 35px; border-radius:25px; border:none; font-size:1.1rem; font-weight:bold; cursor:pointer; margin:10px; color:#fff; }
        .btn-start { background:linear-gradient(135deg,#00b09b,#96c93d); }
        .btn-start:active { transform:scale(0.95); }

        .setup, .results { text-align:center; padding:30px 10px; }
        .setup label { display:block; margin:10px 0 5px; font-size:0.95rem; }
        .setup input, .setup select { width:220px; padding:10px; border-radius:8px; border:none; font-size:1rem; text-align:center; background:rgba(255,255,255,0.9); color:#333; }
        .setup select { appearance:auto; }

        .results .big { font-size:3rem; font-weight:900; }
        .game-area { display:none; }

        .filter-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:10px 0; }
        .filter-btn { padding:6px 16px; border-radius:20px; border:2px solid rgba(255,255,255,0.3); background:transparent; color:#fff; font-size:0.85rem; cursor:pointer; transition:all 0.2s; }
        .filter-btn.active { background:rgba(255,255,255,0.2); border-color:#fff; }
        .filter-btn:active { transform:scale(0.95); }

        .category-tag { display:inline-block; font-size:0.65rem; background:rgba(255,255,255,0.2); padding:2px 6px; border-radius:8px; margin-top:3px; }
    </style>
</head>
<body>
<div class="container">
    <a href="../games.html" class="back-link">← 返回遊戲專區</a>
    <h1>🃏 公式圖像配對</h1>
    <p class="subtitle">配對數學公式和它的答案！</p>

    <div class="setup" id="setup">
        <p>翻開兩張牌，配對公式和答案！</p>
        <label>👤 名字</label>
        <input type="text" id="playerName" placeholder="輸入名字">
        <label>🏫 班別</label>
        <input type="text" id="playerClass" placeholder="例: 2B">
        <label>⚡ 難度</label>
        <select id="diffSelect">
            <option value="Easy">簡單 (Easy)</option>
            <option value="Medium" selected>中等 (Medium)</option>
            <option value="Hard">困難 (Hard)</option>
            <option value="Mixed">混合 (Mixed)</option>
        </select>
        <label>📂 類別</label>
        <select id="catSelect">
            <option value="All" selected>全部</option>
            <option value="代數">代數 Algebra</option>
            <option value="幾何">幾何 Geometry</option>
            <option value="三角">三角 Trigonometry</option>
            <option value="統計">統計 Statistics</option>
            <option value="函數">函數 Functions</option>
            <option value="其他">其他 Others</option>
        </select>
        <label>🎴 配對數量</label>
        <select id="pairCount">
            <option value="6">6 對 (3×4)</option>
            <option value="8" selected>8 對 (4×4)</option>
            <option value="10">10 對 (4×5)</option>
        </select>
        <br><br>
        <button class="btn btn-start" onclick="startGame()">🚀 開始配對</button>
        <p id="loadStatus" style="color:#aaa;font-size:0.8rem;margin-top:10px;"></p>
    </div>

    <div class="game-area" id="gameArea">
        <div class="stats-bar">
            <div class="stat"><span class="num" id="pairsLeft">8</span><span class="lbl">剩餘配對</span></div>
            <div class="stat"><span class="num" id="moves">0</span><span class="lbl">翻牌次數</span></div>
            <div class="stat"><span class="num" id="timer">0</span><span class="lbl">秒</span></div>
        </div>
        <div class="board" id="board"></div>
    </div>

    <div class="results" id="results" style="display:none;">
        <h2>🎉 配對完成！</h2>
        <div class="big" id="finalTime">0</div>
        <p>完成時間（秒）</p>
        <p style="margin:15px 0;">翻牌次數: <strong id="finalMoves">0</strong></p>
        <p style="margin:5px 0;">效率: <strong id="efficiency">0</strong>%</p>
        <button class="btn btn-start" onclick="resetGame()">🔄 再玩</button>
    </div>
</div>

<script>
// Fallback data if JSON fails to load
const FALLBACK_PAIRS = [
    { id:1, formula:'a² − b²', answer:'(a+b)(a−b)', category:'代數', difficulty:'Easy' },
    { id:2, formula:'(a+b)²', answer:'a²+2ab+b²', category:'代數', difficulty:'Easy' },
    { id:3, formula:'sin²θ + cos²θ', answer:'1', category:'三角', difficulty:'Easy' },
    { id:4, formula:'圓面積', answer:'πr²', category:'幾何', difficulty:'Easy' },
    { id:5, formula:'y = mx + c', answer:'直線方程', category:'函數', difficulty:'Easy' },
    { id:6, formula:'畢氏定理', answer:'a²+b²=c²', category:'幾何', difficulty:'Easy' },
    { id:7, formula:'求根公式', answer:'x = (−b±√(b²−4ac)) / 2a', category:'代數', difficulty:'Medium' },
    { id:8, formula:'梯形面積', answer:'½(a+b)×h', category:'幾何', difficulty:'Easy' },
    { id:9, formula:'圓周長', answer:'2πr', category:'幾何', difficulty:'Easy' },
    { id:10, formula:'(a−b)²', answer:'a²−2ab+b²', category:'代數', difficulty:'Easy' },
    { id:11, formula:'三角形面積', answer:'½ × 底 × 高', category:'幾何', difficulty:'Easy' },
    { id:12, formula:'tan θ', answer:'sin θ / cos θ', category:'三角', difficulty:'Easy' },
];

let ALL_PAIRS = [];
let cards = [];
let flipped = [];
let matched = 0;
let moveCount = 0;
let totalPairs = 8;
let timerVal = 0;
let timerInt = null;

// Load question bank
async function loadPairs() {
    const status = document.getElementById('loadStatus');
    try {
        const resp = await fetch('../question-bank/formula_pairs.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        ALL_PAIRS = data.pairs || data;
        status.textContent = '✅ 已載入 ' + ALL_PAIRS.length + ' 條題目';
    } catch(e) {
        console.warn('Failed to load JSON, using fallback:', e);
        ALL_PAIRS = FALLBACK_PAIRS;
        status.textContent = '⚠️ 使用內置題庫 (' + ALL_PAIRS.length + ' 條)';
    }
}
loadPairs();

function shuffle(arr) {
    for(let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

function filterPairs() {
    const diff = document.getElementById('diffSelect').value;
    const cat = document.getElementById('catSelect').value;
    let pool = [...ALL_PAIRS];
    if (cat !== 'All') pool = pool.filter(p => p.category === cat);
    if (diff !== 'Mixed') pool = pool.filter(p => p.difficulty === diff);
    return pool;
}

function startGame() {
    const name = document.getElementById('playerName').value.trim();
    if(!name) { alert('請輸入名字！'); return; }

    totalPairs = parseInt(document.getElementById('pairCount').value);
    let pool = filterPairs();

    if (pool.length < totalPairs) {
        alert('此分類/難度只有 ' + pool.length + ' 條題目，不夠 ' + totalPairs + ' 對。\n請選擇其他設定或減少配對數量。');
        return;
    }

    const selected = shuffle(pool).slice(0, totalPairs);

    // Adjust grid based on pair count
    const board = document.getElementById('board');
    if (totalPairs === 6) {
        board.style.gridTemplateColumns = 'repeat(3,1fr)';
    } else if (totalPairs === 10) {
        board.style.gridTemplateColumns = 'repeat(4,1fr)';
    } else {
        board.style.gridTemplateColumns = 'repeat(4,1fr)';
    }

    cards = [];
    selected.forEach((p, i) => {
        cards.push({ id: i*2, pairId: i, text: p.formula, type: 'formula' });
        cards.push({ id: i*2+1, pairId: i, text: p.answer, type: 'answer' });
    });
    shuffle(cards);

    matched = 0; moveCount = 0; timerVal = 0; flipped = [];

    document.getElementById('setup').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('results').style.display = 'none';

    renderBoard();
    updateStats();
    timerInt = setInterval(() => { timerVal++; document.getElementById('timer').textContent = timerVal; }, 1000);
}

function renderBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    cards.forEach(c => {
        const div = document.createElement('div');
        div.className = 'card hidden-card';
        div.dataset.id = c.id;
        div.addEventListener('click', () => flipCard(c.id, div));
        // Prevent double-tap zoom on iPad
        div.addEventListener('touchend', e => { e.preventDefault(); div.click(); });
        board.appendChild(div);
    });
}

function flipCard(id, el) {
    if(flipped.length >= 2) return;
    if(el.classList.contains('matched') || el.classList.contains('revealed')) return;

    const card = cards.find(c => c.id === id);
    el.classList.remove('hidden-card');
    el.classList.add('revealed');
    el.textContent = card.text;
    flipped.push({ id, pairId: card.pairId, el });

    if(flipped.length === 2) {
        moveCount++;
        document.getElementById('moves').textContent = moveCount;

        if(flipped[0].pairId === flipped[1].pairId) {
            flipped.forEach(f => f.el.classList.add('matched'));
            matched++;
            document.getElementById('pairsLeft').textContent = totalPairs - matched;
            flipped = [];
            if(matched === totalPairs) endGame();
        } else {
            flipped.forEach(f => f.el.classList.add('wrong'));
            setTimeout(() => {
                flipped.forEach(f => {
                    f.el.classList.remove('revealed', 'wrong');
                    f.el.classList.add('hidden-card');
                    f.el.textContent = '';
                });
                flipped = [];
            }, 800);
        }
    }
}

function updateStats() {
    document.getElementById('pairsLeft').textContent = totalPairs - matched;
    document.getElementById('moves').textContent = moveCount;
}

function endGame() {
    clearInterval(timerInt);
    const eff = Math.round((totalPairs / moveCount) * 100);
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('finalTime').textContent = timerVal;
    document.getElementById('finalMoves').textContent = moveCount;
    document.getElementById('efficiency').textContent = eff;
}

function resetGame() {
    clearInterval(timerInt);
    document.getElementById('results').style.display = 'none';
    document.getElementById('setup').style.display = 'block';
}
</script>
</body>
</html>
