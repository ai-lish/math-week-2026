<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rummikub 計時器 | 靈風中學 數學周 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --dark: #2C3E50;
            --light: #ECF0F1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
        }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* Main Menu */
        .menu-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .menu-card h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }
        .menu-card p {
            color: #666;
            margin-bottom: 30px;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }
        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .menu-btn.student { background: var(--primary); }
        .menu-btn.teacher { background: var(--warning); }
        .menu-btn.scorer { background: var(--success); }
        
        /* Student Page */
        .student-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .student-card h2 {
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            background: #eee;
            color: #666;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Teacher Page */
        .teacher-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .teacher-card h2 {
            color: var(--warning);
            margin-bottom: 20px;
            text-align: center;
        }
        .password-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--warning);
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        .teacher-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .teacher-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            background: #eee;
            color: #666;
        }
        .teacher-tab.active {
            background: var(--warning);
            color: white;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .data-table th, .data-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .data-table th {
            background: #f8f9fa;
            font-weight: bold;
        }
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            background: var(--success);
            color: white;
        }
        
        /* Setup Screen */
        .setup-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .setup-card h1 { text-align: center; color: var(--success); margin-bottom: 20px; }
        
        .player-count-btns {
            display: flex;
            gap: 10px;
        }
        .player-count-btns button {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--primary);
            background: white;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .player-count-btns button.active {
            background: var(--primary);
            color: white;
        }
        
        .player-inputs { margin-top: 20px; }
        .player-input {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .player-input .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--success);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .player-input input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        .time-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .time-input input {
            width: 80px;
            padding: 10px;
            border: 2px solid var(--success);
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
        }
        
        .start-btn {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* Game Screen */
        .game-header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .players-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .player-dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .player-dot.active {
            background: var(--success);
            color: white;
            box-shadow: 0 0 20px var(--success);
        }
        
        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            position: relative;
            display: inline-block;
            width: 200px;
            height: 200px;
            line-height: 200px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) 360deg, #eee 0deg);
            color: var(--primary);
        }
        .timer-display::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: white;
            border-radius: 50%;
        }
        .timer-display span {
            position: relative;
            z-index: 1;
        }
        .timer-display.warning { 
            background: conic-gradient(var(--warning) 360deg, #eee 0deg);
            color: var(--warning);
        }
        .timer-display.danger { 
            background: conic-gradient(var(--danger) 360deg, #eee 0deg);
            color: var(--danger);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .timer-container {
            text-align: center;
        }
        
        .game-controls {
            display: flex;
            gap: 10px;
        }
        .game-controls button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-pause { background: var(--warning); color: white; }
        .btn-end { background: var(--danger); color: white; }
        .btn-finish { background: var(--success); color: white; }
        
        /* Back Button */
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.3);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.5);
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Menu -->
        <div id="menuScreen" class="screen active">
            <div class="menu-card">
                <h1>🎲 Rummikub</h1>
                <p>靈風中學 數學周 2026</p>
                
                <a href="#" class="menu-btn student" onclick="showScreen('studentScreen')">
                    👨‍🎓 學生頁面
                </a>
                <a href="#" class="menu-btn teacher" onclick="showScreen('teacherLogin')">
                    👨‍🏫 老師頁面
                </a>
                <a href="#" class="menu-btn scorer" onclick="showScreen('setupScreen')">
                    📊 計分員頁面
                </a>
            </div>
        </div>
        
        <!-- Student Screen -->
        <div id="studentScreen" class="screen">
            <a class="back-btn" onclick="showScreen('menuScreen')">← 返回主目錄</a>
            <div class="student-card">
                <h2>👨‍🎓 學生頁面</h2>
                
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchStudentTab('register')">📝 報名</button>
                    <button class="tab-btn" onclick="switchStudentTab('score')">🔍 查詢成績</button>
                </div>
                
                <!-- Registration Tab -->
                <div id="registerTab">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="regName" placeholder="請輸入姓名">
                    </div>
                    <div class="form-group">
                        <label>班別</label>
                        <input type="text" id="regClass" placeholder="例如：1C">
                    </div>
                    <div class="form-group">
                        <label>學號</label>
                        <input type="text" id="regID" placeholder="請輸入學號">
                    </div>
                    <button class="submit-btn" onclick="registerPlayer()">✅ 提交報名</button>
                </div>
                
                <!-- Score Query Tab -->
                <div id="scoreTab" style="display: none;">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="queryName" placeholder="請輸入姓名">
                    </div>
                    <div class="form-group">
                        <label>班別</label>
                        <input type="text" id="queryClass" placeholder="例如：1C">
                    </div>
                    <div class="form-group">
                        <label>學號</label>
                        <input type="text" id="queryID" placeholder="請輸入學號">
                    </div>
                    <button class="submit-btn" onclick="queryScore()">🔍 查詢成績</button>
                    <div id="scoreResult" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>
        
        <!-- Teacher Login -->
        <div id="teacherLogin" class="screen">
            <a class="back-btn" onclick="showScreen('menuScreen')">← 返回主目錄</a>
            <div class="teacher-card">
                <h2>👨‍🏫 老師登入</h2>
                <input type="password" class="password-input" id="teacherPassword" placeholder="請輸入密碼">
                <button class="submit-btn" onclick="teacherLogin()">登入</button>
                <p id="loginError" style="color: red; text-align: center; margin-top: 10px; display: none;">密碼錯誤！</p>
            </div>
        </div>
        
        <!-- Teacher Page -->
        <div id="teacherPage" class="screen">
            <a class="back-btn" onclick="showScreen('menuScreen')">← 返回主目錄</a>
            <div class="teacher-card">
                <h2>👨‍🏫 老師頁面</h2>
                
                <div class="teacher-tabs">
                    <button class="teacher-tab active" onclick="switchTeacherTab('participants')">📋 報名名單</button>
                    <button class="teacher-tab" onclick="switchTeacherTab('groups')">👥 分組</button>
                </div>
                
                <!-- Participants Tab -->
                <div id="participantsTab">
                    <p style="text-align: center; color: #666;">尚未有學生報名</p>
                </div>
                
                <!-- Groups Tab -->
                <div id="groupsTab">
                    <button class="action-btn" onclick="randomGroup()">🔀 隨機分組 (4人一組)</button>
                    <div id="groupsResult" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>
        
        <!-- Setup Screen (Scorekeeper) -->
        <div id="setupScreen" class="screen">
            <a class="back-btn" onclick="showScreen('menuScreen')">← 返回主目錄</a>
            <div class="setup-card">
                <h1>🎲 Rummikub 計時器</h1>
                
                <div class="form-group">
                    <label>👥 玩家人數</label>
                    <div class="player-count-btns">
                        <button onclick="setPlayerCount(2)">2人</button>
                        <button onclick="setPlayerCount(3)">3人</button>
                        <button onclick="setPlayerCount(4)" class="active">4人</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📝 玩家名稱</label>
                    <div class="player-inputs" id="playerInputs"></div>
                </div>
                
                <div class="form-group">
                    <label>⏱️ 每回合時間 (秒)</label>
                    <div class="time-input">
                        <input type="number" id="turnTime" value="60">
                        <span>秒</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🎲 起始玩家</label>
                    <div class="player-count-btns" id="startPlayerBtns"></div>
                </div>
                
                <button class="start-btn" onclick="startGame()">🚀 開始遊戲</button>
            </div>
        </div>
        
        <!-- Game Screen -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="players-row" id="playersRow"></div>
            </div>
            
            <div class="timer-container">
                <div class="current-player-name" id="currentPlayerName">玩家1</div>
                <div class="timer-display" id="timerDisplay"><span>60</span></div>
                <div class="timer-label" id="timerLabel">秒</div>
            </div>
            
            <div class="game-controls">
                <button class="btn-pause" onclick="togglePause()">⏸️ 暫停</button>
                <button class="btn-end" onclick="endTurn()">⏭️ 下一位</button>
                <button class="btn-finish" onclick="finishRound()">🏁 結束遊戲</button>
            </div>
        </div>
        
    </div>

    <script>
        // ==================== Navigation ====================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        
        function switchStudentTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'register') {
                document.getElementById('registerTab').style.display = 'block';
                document.getElementById('scoreTab').style.display = 'none';
            } else {
                document.getElementById('registerTab').style.display = 'none';
                document.getElementById('scoreTab').style.display = 'block';
            }
        }
        
        function switchTeacherTab(tab) {
            document.querySelectorAll('.teacher-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'participants') {
                document.getElementById('participantsTab').style.display = 'block';
                document.getElementById('groupsTab').style.display = 'none';
            } else {
                document.getElementById('participantsTab').style.display = 'none';
                document.getElementById('groupsTab').style.display = 'block';
            }
        }
        
        // ==================== Student Functions ====================
        function registerPlayer() {
            const name = document.getElementById('regName').value;
            const className = document.getElementById('regClass').value;
            const id = document.getElementById('regID').value;
            
            if (!name || !className || !id) {
                alert('請填寫所有資料！');
                return;
            }
            
            // TODO: Connect to Google Sheets
            alert('報名成功！\n姓名：' + name + '\n班別：' + className + '\n學號：' + id);
            
            // Clear form
            document.getElementById('regName').value = '';
            document.getElementById('regClass').value = '';
            document.getElementById('regID').value = '';
        }
        
        function queryScore() {
            const name = document.getElementById('queryName').value;
            const className = document.getElementById('queryClass').value;
            const id = document.getElementById('queryID').value;
            
            if (!name || !className || !id) {
                alert('請填寫所有資料！');
                return;
            }
            
            // TODO: Connect to Google Sheets
            document.getElementById('scoreResult').innerHTML = 
                '<div style="padding: 20px; background: #f8f9fa; border-radius: 10px; text-align: center;">' +
                '<p style="color: #666;">暫時未能找到成績</p>' +
                '<p style="font-size: 0.9rem; color: #999;">連接Google Sheets後即可查詢</p></div>';
        }
        
        // ==================== Teacher Functions ====================
        let teacherPassword = 'math2026'; // TODO: Move to Google Sheets
        
        function teacherLogin() {
            const input = document.getElementById('teacherPassword').value;
            if (input === teacherPassword) {
                document.getElementById('loginError').style.display = 'none';
                showScreen('teacherPage');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        let participants = []; // TODO: Load from Google Sheets
        
        function randomGroup() {
            if (participants.length < 4) {
                alert('報名人數不足，需要至少4人！');
                return;
            }
            
            // Shuffle
            let shuffled = [...participants].sort(() => Math.random() - 0.5);
            let groups = [];
            for (let i = 0; i < shuffled.length; i += 4) {
                groups.push(shuffled.slice(i, i + 4));
            }
            
            // Display
            let html = '<table class="data-table"><tr><th>組別</th><th>隊員</th></tr>';
            groups.forEach((group, idx) => {
                html += '<tr><td>第' + (idx+1) + '組</td><td>' + group.map(p => p.name).join('、') + '</td></tr>';
            });
            html += '</table>';
            
            document.getElementById('groupsResult').innerHTML = html;
        }
        
        // ==================== Game Functions ====================
        let playerCount = 4;
        let players = [];
        let turnTime = 60;
        let currentPlayer = 0;
        let timerInterval = null;
        let timeLeft = 60;
        let isPaused = false;
        
        function setPlayerCount(count) {
            playerCount = count;
            document.querySelectorAll('.player-count-btns button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            generatePlayerInputs();

        function generatePlayerInputs() {
            const container = document.getElementById('playerInputs');
            container.innerHTML = '';
            
            for (let i = 1; i <= playerCount; i++) {
                container.innerHTML += `
                    <div class="player-input">
                        <div class="avatar">P${i}</div>
                        <input type="text" placeholder="玩家${i}名稱" id="player${i}Name">
                    </div>
                `;
            }
            
            // Generate start player buttons
            const startContainer = document.getElementById('startPlayerBtns');
            startContainer.innerHTML = '';
            for (let i = 1; i <= playerCount; i++) {
                startContainer.innerHTML += `<button onclick="setStartPlayer(${i-1})">玩家${i}</button>`;
            }
        }
        
        function setStartPlayer(idx) {
            currentPlayer = idx;
            document.querySelectorAll('#startPlayerBtns button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function startGame() {
            players = [];
            for (let i = 1; i <= playerCount; i++) {
                let name = document.getElementById('player' + i + 'Name').value || '玩家' + i;
                players.push({ name: name, score: 0 });
            }
            
            turnTime = parseInt(document.getElementById('turnTime').value) || 60;
            
            updateGameUI();
            showScreen('gameScreen');
            startTimer();
        }
        
        function updateGameUI() {
            const container = document.getElementById('playersRow');
            container.innerHTML = '';
            
            players.forEach((player, idx) => {
                let active = idx === currentPlayer ? 'active' : '';
                container.innerHTML += `<div class="player-dot ${active}">${player.name.charAt(0)}</div>`;
            });
            
            document.getElementById('currentPlayerName').textContent = players[currentPlayer].name;
        }
        
        function startTimer() {
            timeLeft = turnTime;
            isPaused = false;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateTimerDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        // TODO: Play alarm sound
                        alert('時間到！');
                    } else if (timeLeft <= 10) {
                        // TODO: Play warning beep
                    }
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const display = document.getElementById('timerDisplay');
            display.querySelector('span').textContent = timeLeft;
            
            display.classList.remove('warning', 'danger');
            if (timeLeft <= 10) {
                display.classList.add('danger');
            } else if (timeLeft <= 20) {
                display.classList.add('warning');
            }
        }
        
        function togglePause() {
            isPaused = !isPaused;
            document.querySelector('.btn-pause').textContent = isPaused ? '▶️ 繼續' : '⏸️ 暫停';
        }
        
        function endTurn() {
            currentPlayer = (currentPlayer + 1) % playerCount;
            updateGameUI();
            startTimer();
        }
        
        function finishRound() {
            clearInterval(timerInterval);
            alert('遊戲結束！');
            showScreen('menuScreen');
        }
        
        // Initialize
        generatePlayerInputs();
    </script>
</body>
</html>
