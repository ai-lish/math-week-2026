<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 Rummikub 計時器 | 靈風中學 數學周 2026</title>
    <meta name="description" content="靈風中學數學周2026 Rummikub計時器 — 方便老師和學生計算Rummikub遊戲時間的工具。">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: var(--bg); font-family: var(--font); }
        :root {
            --primary: #4A90E2;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --dark: #2C3E50;
            --light: #ECF0F1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .rmk-page-header {
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .rmk-page-header h1 { margin-bottom: 8px; }
        .rmk-page-header p { opacity: 0.8; }

        .rmk-container { max-width: 580px; margin: 0 auto; padding: 20px; }

        /* Screens */
        .rmk-screen { display: none; }
        .rmk-screen.active { display: block; }

        /* Card */
        .rmk-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .rmk-card h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .rmk-card h2.blue { color: var(--primary); }
        .rmk-card h2.yellow { color: var(--warning); }
        .rmk-card h2.green { color: var(--success); }

        /* Menu buttons */
        .rmk-menu-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            color: white;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .rmk-menu-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .rmk-menu-btn.student { background: var(--primary); }
        .rmk-menu-btn.teacher { background: var(--warning); }
        .rmk-menu-btn.scorer { background: var(--success); }

        /* Back */
        .rmk-back {
            display: inline-block;
            padding: 10px 18px;
            background: var(--bg-alt);
            color: var(--text);
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 16px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: var(--font);
        }
        .rmk-back:hover { background: var(--primary); color: white; }

        /* Form */
        .rmk-form-group { margin-bottom: 18px; }
        .rmk-form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; }
        .rmk-form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--bg-alt);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: var(--font);
            transition: var(--transition);
        }
        .rmk-form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .rmk-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            transition: var(--transition);
        }
        .rmk-submit:hover { background: var(--primary-dark); }

        /* Tabs */
        .rmk-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }
        .rmk-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--bg-alt);
            color: var(--text-light);
            font-family: var(--font);
            transition: var(--transition);
        }
        .rmk-tab.active { background: var(--primary); color: white; }

        /* Player inputs */
        .rmk-player-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .rmk-player-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            flex-shrink: 0;
            font-size: 0.9rem;
        }
        .rmk-player-row input { flex: 1; }

        /* Player count btns */
        .rmk-count-btns {
            display: flex;
            gap: 8px;
        }
        .rmk-count-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--primary);
            background: white;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            transition: var(--transition);
        }
        .rmk-count-btn.active { background: var(--primary); color: white; }

        /* Game UI */
        .rmk-players-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .rmk-player-dot {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--bg-alt);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--text-light);
            transition: var(--transition);
        }
        .rmk-player-dot.active {
            background: var(--success);
            color: white;
            box-shadow: 0 0 20px rgba(46,204,113,0.4);
        }
        .rmk-current-name {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }
        .rmk-timer-container { text-align: center; margin-bottom: 20px; }
        .rmk-timer-display {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) 360deg, var(--bg-alt) 0deg);
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            position: relative;
            transition: var(--transition);
        }
        .rmk-timer-display::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            background: white;
            border-radius: 50%;
        }
        .rmk-timer-display span { position: relative; z-index: 1; }
        .rmk-timer-display.warning { background: conic-gradient(var(--warning) 360deg, var(--bg-alt) 0deg); color: var(--warning); }
        .rmk-timer-display.danger {
            background: conic-gradient(var(--danger) 360deg, var(--bg-alt) 0deg);
            color: var(--danger);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .rmk-timer-label { font-size: 0.85rem; color: var(--text-light); margin-top: 6px; }
        .rmk-controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .rmk-ctrl-btn {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            color: white;
            transition: var(--transition);
            min-width: 100px;
        }
        .rmk-ctrl-btn.pause { background: var(--warning); }
        .rmk-ctrl-btn.next { background: var(--primary); }
        .rmk-ctrl-btn.end { background: var(--danger); }
        .rmk-ctrl-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Scorer keypad */
        .rmk-keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .rmk-key {
            padding: 14px;
            border: 2px solid var(--bg-alt);
            border-radius: var(--radius-sm);
            background: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            transition: var(--transition);
        }
        .rmk-key:hover { border-color: var(--primary); background: var(--bg); }
        .rmk-key.special { background: #fce4ec; border-color: #f8bbd0; color: #c2185b; }
        .rmk-key百 { background: #e8f5e9; border-color: #c8e6c9; color: #2e7d32; }
        .rmk-expression {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        .rmk-expression-text { font-size: 1rem; color: var(--text-light); min-height: 24px; }
        .rmk-expression-total { font-size: 2.5rem; font-weight: 900; color: var(--primary); }
        .rmk-action-row { display: flex; gap: 8px; }
        .rmk-action-row button { flex: 1; padding: 12px; border: none; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: var(--font); color: white; transition: var(--transition); }
        .rmk-action-row .rmk-undo { background: var(--warning); }
        .rmk-action-row .rmk-clear { background: var(--danger); }
        .rmk-action-row .rmk-confirm { background: var(--success); flex: 2; }

        /* Result table */
        .rmk-result-table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: var(--radius-sm); }
        .rmk-result-table th { background: var(--primary); color: white; padding: 12px; text-align: center; font-size: 0.85rem; }
        .rmk-result-table td { padding: 12px; text-align: center; border-bottom: 1px solid var(--bg-alt); font-size: 0.9rem; }
        .rmk-result-table tr:last-child td { border-bottom: none; }
        .rmk-result-row-win { background: #fff9c4 !important; border-left: 4px solid var(--warning); }

        /* Scoring player selector */
        .rmk-score-players {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .rmk-score-player {
            flex: 1;
            min-width: 70px;
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            background: var(--bg-alt);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        .rmk-score-player.active { background: var(--success); color: white; border-color: var(--success); }
        .rmk-score-player-name { font-weight: 700; font-size: 0.85rem; }
        .rmk-score-player-pts { font-size: 0.78rem; opacity: 0.7; margin-top: 2px; }

        .rmk-next-btn {
            display: none;
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
        }

        /* Final result medals */
        .medal-row { font-size: 1.2rem; }
    </style>
</head>
<body>

<!-- Back -->
<div style="position:sticky;top:0;z-index:100;">
    <a href="index.html" class="rmk-back" style="margin:16px 20px;display:inline-flex;align-items:center;gap:6px;">
        ← 返回首頁
    </a>
</div>

<!-- Header -->
<div class="rmk-page-header">
    <h1>🧩 Rummikub 計時器</h1>
    <p>靈風中學 數學周 2026</p>
</div>

<div class="rmk-container">

    <!-- Menu -->
    <div id="menuScreen" class="rmk-screen active">
        <div class="rmk-card">
            <h2 class="blue">🎲 請選擇身份</h2>
            <button class="rmk-menu-btn student" onclick="showScreen('studentScreen')">
                <span>👨‍🎓</span> 學生頁面
            </button>
            <button class="rmk-menu-btn teacher" onclick="showScreen('teacherLogin')">
                <span>👨‍🏫</span> 老師頁面
            </button>
            <button class="rmk-menu-btn scorer" onclick="showScreen('setupScreen')">
                <span>📊</span> 計分員頁面
            </button>
        </div>
    </div>

    <!-- Student -->
    <div id="studentScreen" class="rmk-screen">
        <button class="rmk-back" onclick="showScreen('menuScreen')">← 返回主目錄</button>
        <div class="rmk-card">
            <h2 class="blue">👨‍🎓 學生頁面</h2>
            <div class="rmk-tabs">
                <button class="rmk-tab active" onclick="switchStudentTab('register', this)">📝 報名</button>
                <button class="rmk-tab" onclick="switchStudentTab('score', this)">🔍 查詢成績</button>
            </div>
            <div id="registerTab">
                <div class="rmk-form-group">
                    <label>姓名</label>
                    <input type="text" id="regName" placeholder="請輸入姓名">
                </div>
                <div class="rmk-form-group">
                    <label>班別</label>
                    <input type="text" id="regClass" placeholder="例如：1C">
                </div>
                <div class="rmk-form-group">
                    <label>學號</label>
                    <input type="text" id="regID" placeholder="請輸入學號">
                </div>
                <button class="rmk-submit" onclick="registerPlayer()">✅ 提交報名</button>
            </div>
            <div id="scoreTab" style="display:none;">
                <div class="rmk-form-group">
                    <label>姓名</label>
                    <input type="text" id="queryName" placeholder="請輸入姓名">
                </div>
                <div class="rmk-form-group">
                    <label>班別</label>
                    <input type="text" id="queryClass" placeholder="例如：1C">
                </div>
                <div class="rmk-form-group">
                    <label>學號</label>
                    <input type="text" id="queryID" placeholder="請輸入學號">
                </div>
                <button class="rmk-submit" onclick="queryScore()">🔍 查詢成績</button>
                <div id="scoreResult" style="margin-top:16px;"></div>
            </div>
        </div>
    </div>

    <!-- Teacher Login -->
    <div id="teacherLogin" class="rmk-screen">
        <button class="rmk-back" onclick="showScreen('menuScreen')">← 返回主目錄</button>
        <div class="rmk-card">
            <h2 class="yellow">👨‍🏫 老師登入</h2>
            <div class="rmk-form-group">
                <label>密碼</label>
                <input type="password" id="teacherPassword" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')teacherLogin()">
            </div>
            <button class="rmk-submit" onclick="teacherLogin()">登入</button>
            <p id="loginError" style="color:var(--danger);text-align:center;margin-top:10px;display:none;">密碼錯誤！</p>
        </div>
    </div>

    <!-- Teacher Page -->
    <div id="teacherPage" class="rmk-screen">
        <button class="rmk-back" onclick="showScreen('menuScreen')">← 返回主目錄</button>
        <div class="rmk-card">
            <h2 class="yellow">👨‍🏫 老師頁面</h2>
            <div class="rmk-tabs">
                <button class="rmk-tab active" onclick="switchTeacherTab('participants', this)">📋 報名名單</button>
                <button class="rmk-tab" onclick="switchTeacherTab('groups', this)">👥 分組</button>
            </div>
            <div id="participantsTab">
                <p style="text-align:center;color:var(--text-light);padding:20px;">尚未有學生報名</p>
            </div>
            <div id="groupsTab" style="display:none;">
                <button class="rmk-submit" style="background:var(--warning);" onclick="randomGroup()">🔀 隨機分組 (4人一組)</button>
                <div id="groupsResult" style="margin-top:16px;"></div>
            </div>
        </div>
    </div>

    <!-- Setup -->
    <div id="setupScreen" class="rmk-screen">
        <button class="rmk-back" onclick="showScreen('menuScreen')">← 返回主目錄</button>
        <div class="rmk-card">
            <h2 class="green">🎲 Rummikub 計時器</h2>
            <div class="rmk-form-group">
                <label>👥 玩家人數</label>
                <div class="rmk-count-btns">
                    <button class="rmk-count-btn" onclick="setPlayerCount(2)">2人</button>
                    <button class="rmk-count-btn" onclick="setPlayerCount(3)">3人</button>
                    <button class="rmk-count-btn active" onclick="setPlayerCount(4)">4人</button>
                </div>
            </div>
            <div class="rmk-form-group">
                <label>📝 玩家名稱</label>
                <div id="playerInputs"></div>
            </div>
            <div class="rmk-form-group">
                <label>⏱️ 每回合時間 (秒)</label>
                <div style="display:flex;align-items:center;gap:10px;">
                    <input type="number" id="turnTime" value="60" style="width:100px;text-align:center;">
                    <span style="color:var(--text-light);">秒</span>
                </div>
            </div>
            <div class="rmk-form-group">
                <label>🎲 起始玩家</label>
                <div id="startPlayerBtns" style="display:flex;gap:8px;"></div>
            </div>
            <button class="rmk-submit" style="background:var(--success);" onclick="startGame()">🚀 開始遊戲</button>
        </div>
    </div>

    <!-- Game -->
    <div id="gameScreen" class="rmk-screen">
        <button class="rmk-back" onclick="if(confirm('確定要離開遊戲？'))showScreen('menuScreen')">← 返回</button>
        <div class="rmk-card">
            <div class="rmk-players-row" id="playersRow"></div>
            <div class="rmk-current-name" id="currentPlayerName">玩家1</div>
            <div class="rmk-timer-container">
                <div class="rmk-timer-display" id="timerDisplay"><span>60</span></div>
                <div class="rmk-timer-label">秒</div>
            </div>
            <div class="rmk-controls">
                <button class="rmk-ctrl-btn pause" onclick="togglePause()">⏸️ 暫停</button>
                <button class="rmk-ctrl-btn next" onclick="endTurn()">⏭️ 下一位</button>
                <button class="rmk-ctrl-btn end" onclick="finishRound()">🏁 結束遊戲</button>
            </div>
        </div>
    </div>

    <!-- Scoring -->
    <div id="scoringScreen" class="rmk-screen">
        <button class="rmk-back" onclick="showScreen('menuScreen')">← 返回主目錄</button>
        <div class="rmk-card">
            <h2 class="green">📊 輸入分數 — 第<span id="currentRound">1</span>回合</h2>
            <div class="rmk-score-players" id="scoringPlayers"></div>
            <div class="rmk-expression">
                <div class="rmk-expression-text" id="currentExpression"></div>
                <div class="rmk-expression-total" id="currentTotal">= 0</div>
            </div>
            <div class="rmk-keypad">
                <button class="rmk-key" onclick="addTile(1)">1</button>
                <button class="rmk-key" onclick="addTile(2)">2</button>
                <button class="rmk-key" onclick="addTile(3)">3</button>
                <button class="rmk-key" onclick="addTile(4)">4</button>
                <button class="rmk-key" onclick="addTile(5)">5</button>
                <button class="rmk-key" onclick="addTile(6)">6</button>
                <button class="rmk-key" onclick="addTile(7)">7</button>
                <button class="rmk-key" onclick="addTile(8)">8</button>
                <button class="rmk-key" onclick="addTile(9)">9</button>
                <button class="rmk-key" onclick="addTile(10)">10</button>
                <button class="rmk-key special" onclick="addTile(11)">11</button>
                <button class="rmk-key special" onclick="addTile(12)">12</button>
                <button class="rmk-key special" onclick="addTile(13)">🃏</button>
                <button class="rmk-key special" onclick="addTile(25)">25</button>
                <button class="rmk-key rmk-key百" onclick="addTile(100)">百搭</button>
            </div>
            <div class="rmk-action-row">
                <button class="rmk-undo" onclick="clearLast()">↩️ 取消</button>
                <button class="rmk-clear" onclick="clearAll()">🗑️ 清除</button>
                <button class="rmk-confirm" onclick="confirmScore()">✓ 確認</button>
            </div>
            <button class="rmk-next-btn" id="nextScoringBtn" onclick="showRoundResult()">
                ✅ 確認並查看結果
            </button>
        </div>
    </div>

    <!-- Round Result -->
    <div id="resultScreen" class="rmk-screen">
        <button class="rmk-back" onclick="showScreen('menuScreen')">← 返回主目錄</button>
        <div class="rmk-card">
            <h2 class="blue">🏆 第<span id="resultRound">1</span>回合結果</h2>
            <table class="rmk-result-table" id="resultTableBody">
                <thead>
                    <tr>
                        <th>玩家</th>
                        <th>今回扣分</th>
                        <th>總分</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div style="display:flex;gap:8px;margin-top:16px;">
                <button class="rmk-submit" style="background:var(--warning);flex:1;" onclick="nextRound()">🔄 下一回合</button>
                <button class="rmk-submit" style="background:var(--danger);flex:1;" onclick="endGame()">🏁 結束遊戲</button>
            </div>
        </div>
    </div>

    <!-- Final Result -->
    <div id="finalResultScreen" class="rmk-screen">
        <button class="rmk-back" onclick="showScreen('menuScreen')">← 返回主目錄</button>
        <div class="rmk-card">
            <h2 class="green" style="font-size:1.8rem;">🎉 最終結果</h2>
            <table class="rmk-result-table" style="margin-top:16px;">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>玩家</th>
                        <th>總分</th>
                    </tr>
                </thead>
                <tbody id="finalResultBody"></tbody>
            </table>
            <button class="rmk-submit" style="margin-top:16px;" onclick="resetGame()">🔄 重新遊戲</button>
        </div>
    </div>

</div>

<footer class="footer" style="margin-top:20px;">
    <div class="footer-logo">🧩 靈風中學 數學周 2026</div>
</footer>

<script>
// ==================== Navigation ====================
function showScreen(screenId) {
    document.querySelectorAll('.rmk-screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function switchStudentTab(tab, btn) {
    document.querySelectorAll('#studentScreen .rmk-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('registerTab').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('scoreTab').style.display = tab === 'score' ? 'block' : 'none';
}

function switchTeacherTab(tab, btn) {
    document.querySelectorAll('#teacherPage .rmk-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('participantsTab').style.display = tab === 'participants' ? 'block' : 'none';
    document.getElementById('groupsTab').style.display = tab === 'groups' ? 'block' : 'none';
}

// ==================== Student ====================
function registerPlayer() {
    const name = document.getElementById('regName').value;
    const cls = document.getElementById('regClass').value;
    const id = document.getElementById('regID').value;
    if (!name || !cls || !id) { alert('請填寫所有資料！'); return; }
    alert('報名成功！\n姓名：' + name + '\n班別：' + cls + '\n學號：' + id);
    document.getElementById('regName').value = '';
    document.getElementById('regClass').value = '';
    document.getElementById('regID').value = '';
}
function queryScore() {
    document.getElementById('scoreResult').innerHTML =
        '<div style="padding:16px;background:var(--bg);border-radius:var(--radius-sm);text-align:center;color:var(--text-light);">暫時未能找到成績<br><small>連接Google Sheets後即可查詢</small></div>';
}

        showScreen('teacherPage');
    } else {

}

// ==================== Game Setup ====================
let playerCount = 4, players = [], round = 1, currentScoringIndex = 0;
let turnTime = 60, currentPlayer = 0, timerInterval = null, timeLeft = 60, isPaused = false;
let currentTiles = [];

function setPlayerCount(count) {
    playerCount = count;
    document.querySelectorAll('.rmk-count-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    generatePlayerInputs();
}
function generatePlayerInputs() {
    let html = '';
    for (let i = 1; i <= playerCount; i++) {
        html += `<div class="rmk-player-row">
            <div class="rmk-player-avatar">P${i}</div>
            <input type="text" placeholder="玩家${i}名稱" id="player${i}Name">
        </div>`;
    }
    document.getElementById('playerInputs').innerHTML = html;
    let btns = '';
    for (let i = 1; i <= playerCount; i++) {
        btns += `<button class="rmk-count-btn" onclick="setStartPlayer(${i-1},this)">玩家${i}</button>`;
    }
    document.getElementById('startPlayerBtns').innerHTML = btns;
}
function setStartPlayer(idx, btn) {
    currentPlayer = idx;
    document.querySelectorAll('#startPlayerBtns .rmk-count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
function startGame() {
    players = [];
    for (let i = 1; i <= playerCount; i++) {
        let name = document.getElementById('player' + i + 'Name').value || '玩家' + i;
        players.push({ name, score: 0 });
    }
    turnTime = parseInt(document.getElementById('turnTime').value) || 60;
    updateGameUI();
    showScreen('gameScreen');
    startTimer();
}
function updateGameUI() {
    let html = '';
    players.forEach((p, i) => {
        html += `<div class="rmk-player-dot ${i === currentPlayer ? 'active' : ''}">${p.name.charAt(0)}</div>`;
    });
    document.getElementById('playersRow').innerHTML = html;
    document.getElementById('currentPlayerName').textContent = players[currentPlayer].name;
}
function startTimer() {
    timeLeft = turnTime;
    isPaused = false;
    updateTimerDisplay();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (!isPaused) {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) { clearInterval(timerInterval); alert('時間到！'); }
        }
    }, 1000);
}
function updateTimerDisplay() {
    const d = document.getElementById('timerDisplay');
    d.querySelector('span').textContent = timeLeft;
    d.classList.remove('warning', 'danger');
    if (timeLeft <= 10) d.classList.add('danger');
    else if (timeLeft <= 20) d.classList.add('warning');
}
function togglePause() {
    isPaused = !isPaused;
    document.querySelector('.rmk-ctrl-btn.pause').textContent = isPaused ? '▶️ 繼續' : '⏸️ 暫停';
}
function endTurn() {
    clearInterval(timerInterval);
    currentPlayer = (currentPlayer + 1) % playerCount;
    updateGameUI();
    startTimer();
}
function finishRound() {
    clearInterval(timerInterval);
    currentScoringIndex = 0;
    round = 1;
    showScreen('scoringScreen');
    updateScoringUI();
}

// ==================== Scoring ====================
function updateScoringUI() {
    let html = '';
    players.forEach((p, i) => {
        html += `<div class="rmk-score-player ${i === currentScoringIndex ? 'active' : ''}" onclick="selectScoringPlayer(${i})">
            <div class="rmk-score-player-name">${p.name}</div>
            <div class="rmk-score-player-pts">${p.score}分</div>
        </div>`;
    });
    document.getElementById('scoringPlayers').innerHTML = html;
    currentTiles = [];
    updateTilesDisplay();
    document.getElementById('currentRound').textContent = round;
    document.getElementById('nextScoringBtn').style.display = 'none';
}
function selectScoringPlayer(index) {
    currentScoringIndex = index;
    currentTiles = [];
    updateScoringUI();
}
function addTile(value) {
    currentTiles.push(value);
    updateTilesDisplay();
}
function updateTilesDisplay() {
    const expr = currentTiles.join(' + ');
    const total = currentTiles.reduce((a, b) => a + b, 0);
    document.getElementById('currentExpression').textContent = expr || '';
    document.getElementById('currentTotal').textContent = total > 0 ? '= ' + total : '= 0';
}
function clearLast() { currentTiles.pop(); updateTilesDisplay(); }
function clearAll() { currentTiles = []; updateTilesDisplay(); }
function
function confirmScore() {
    if (currentTiles.length === 0) return;
    const total = currentTiles.reduce((a, b) => a + b, 0);
    players[currentScoringIndex].score -= total;
    if (currentScoringIndex < players.length - 1) {
        currentScoringIndex++;
        currentTiles = [];
        updateScoringUI();
    } else {
        document.getElementById('nextScoringBtn').style.display = 'block';
    }
}
function showRoundResult() {
    document.getElementById('resultRound').textContent = round;
    const tbody = document.querySelector('#resultTableBody tbody');
    tbody.innerHTML = '';
    players.forEach(p => {
        const isWin = p.score === Math.max(...players.map(x => x.score));
        tbody.innerHTML += `<tr class="${isWin ? 'rmk-result-row-win' : ''}">
            <td>${p.name}</td>
            <td>−${Math.abs(currentTiles.reduce((a,b)=>a+b,0))}</td>
            <td style="font-weight:900;">${p.score}</td>
        </tr>`;
    });
    showScreen('resultScreen');
}
function nextRound() {
    round++;
    currentPlayer = (currentPlayer + 1) % playerCount;
    currentScoringIndex = 0;
    showScreen('gameScreen');
    updateGameUI();
    startTimer();
}
function endGame() {
    const sorted = players.map((p, i) => ({name: p.name, score: p.score, index: i})).sort((a, b) => b.score - a.score);
    const tbody = document.getElementById('finalResultBody');
    tbody.innerHTML = '';
    sorted.forEach((p, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
        tbody.innerHTML += `<tr ${i===0?'style="background:#fff9c4"':''}>
            <td class="medal-row">${medal} ${i + 1}</td>
            <td>${p.name}</td>
            <td style="font-weight:900;">${p.score}</td>
        </tr>`;
    });
    showScreen('finalResultScreen');
}
function resetGame() { showScreen('menuScreen'); }
generatePlayerInputs();
</script>
